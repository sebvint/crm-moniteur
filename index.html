<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ProxiPilot — Codisud</title>
  <meta name="description" content="CRM Moniteur des ventes — Codisud">
  <meta name="theme-color" content="#C9921A">

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">

  <!-- ProxiPilot CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<!-- ══════════════════════════════════════
     ÉCRAN AUTH — PIN
     ══════════════════════════════════════ -->
<div id="auth-screen" style="
  display: none;
  position: fixed;
  inset: 0;
  background: var(--color-app-bg);
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: var(--space-8);
">
  <div style="text-align: center;">
    <div style="
      width: 56px; height: 56px;
      background: var(--color-gold);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-4);
      font-size: 24px; font-weight: 700; color: white;
      letter-spacing: -1px;
    ">P</div>
    <div style="font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--color-text-dark);">
      ProxiPilot
    </div>
    <div style="font-size: var(--text-sm); color: var(--color-text-light); margin-top: 4px;">
      Codisud — Secteur Sud Est
    </div>
  </div>

  <div style="
    background: var(--color-card-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    padding: var(--space-8);
    width: 320px;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  ">
    <div style="font-size: var(--text-md); font-weight: var(--weight-semi); color: var(--color-text-dark); text-align: center;">
      Entrez votre PIN
    </div>

    <input
      id="pin-input"
      type="password"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="4"
      placeholder="• • • •"
      autocomplete="off"
      style="
        text-align: center;
        font-size: 28px;
        letter-spacing: 8px;
        padding: var(--space-3) var(--space-4);
        background: var(--color-app-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        color: var(--color-text-dark);
        outline: none;
        width: 100%;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      "
    >

    <div id="pin-error" style="
      font-size: var(--text-sm);
      color: var(--color-red-text);
      text-align: center;
      min-height: 18px;
    "></div>

    <button id="pin-submit" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">
      Connexion
    </button>

    <div style="font-size: var(--text-xs); color: var(--color-text-light); text-align: center;">
      Demo : PIN <strong>0000</strong> (admin) · <strong>1111</strong> (moniteur)
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP SHELL
     ══════════════════════════════════════ -->
<div class="app-shell" id="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar desktop-only" id="sidebar">
    <!-- Rendu par sidebar.js -->
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- TOPBAR -->
    <header class="topbar" id="topbar">
      <div class="topbar-breadcrumb">
        <span class="topbar-title" id="topbar-title">Tableau de bord</span>
        <span class="topbar-sep" id="topbar-sep" style="display:none">·</span>
        <span class="topbar-subtitle" id="topbar-subtitle"></span>
      </div>

      <div class="topbar-actions" id="topbar-actions">
        <!-- Sélecteur scope admin (injecté par dashboard.js si admin) -->
        <div id="scope-selector-slot"></div>

        <!-- Bouton nouvelle visite (desktop) -->
        <button class="btn btn-primary btn-sm desktop-only" id="btn-new-visite" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle visite
        </button>

        <!-- Notifications (placeholder) -->
        <button class="icon-btn" title="Notifications" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M10 5a2 2 0 1 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3H4a4 4 0 0 0 2-3V11a7 7 0 0 1 4-6"/>
            <path d="M9 17v1a3 3 0 0 0 6 0v-1"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- CONTENT ZONE -->
    <main class="content" id="content">
      <!-- Pages injectées dynamiquement -->
    </main>

  </div><!-- /main-area -->

</div><!-- /app-shell -->

<!-- ══════════════════════════════════════
     PANNEAU LATÉRAL INLINE
     ══════════════════════════════════════ -->
<div class="panel-overlay" id="panel-overlay"></div>
<aside class="side-panel" id="side-panel" aria-label="Détails">
  <div class="side-panel-header">
    <span class="side-panel-title" id="side-panel-title">Détails</span>
    <button class="icon-btn" id="side-panel-close" title="Fermer" aria-label="Fermer le panneau">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="side-panel-body" id="side-panel-body">
    <!-- Contenu injecté dynamiquement -->
  </div>
</aside>

<!-- ══════════════════════════════════════
     MOBILE — TABBAR + FAB
     ══════════════════════════════════════ -->
<nav class="tabbar mobile-only" id="mobile-tabbar" aria-label="Navigation principale">
  <!-- Rendu par app.js -->
</nav>

<button class="fab mobile-only" id="fab-visite" title="Nouvelle visite" aria-label="Démarrer une visite">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- ══════════════════════════════════════
     TOASTS
     ══════════════════════════════════════ -->
<div class="toast-container" id="toast-container" aria-live="polite"></div>

<!-- ══════════════════════════════════════
     INIT
     ══════════════════════════════════════ -->
<script type="module">
  import { initApp } from './js/app.js';

  // Focus input PIN quand screen visible
  const pinInput = document.getElementById('pin-input');
  if (pinInput) {
    pinInput.addEventListener('focus', () => {
      pinInput.style.borderColor = 'var(--color-gold)';
      pinInput.style.boxShadow = '0 0 0 2px rgba(201,146,26,0.15)';
    });
    pinInput.addEventListener('blur', () => {
      pinInput.style.borderColor = 'var(--color-border)';
      pinInput.style.boxShadow = 'none';
    });
  }

  // FAB → visite mobile
  document.getElementById('fab-visite')?.addEventListener('click', () => {
    import('./js/visites.js').then(m => m.openNewVisiteMobile?.());
  });

  initApp();
</script>

</body>
</html>
