<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F8F8F8">
<title>Moniteur des Ventes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F8F8;color:#111;padding-bottom:70px;}
button,select,input,textarea{font-family:inherit;outline:none;}
a{text-decoration:none;color:inherit;}
:root{
  --or:#C9921A;--orl:#FDF7E8;--orb:#E8D080;
  --rouge:#D94040;--rougel:#FDF0F0;--rougeb:#F0C0C0;
  --orange:#D07030;--orangel:#FEF5EC;--orangeb:#ECC890;
  --vert:#2E8050;--vertl:#F0F9F4;--vertb:#98D0B0;
  --card:#fff;--bg:#F8F8F8;--bord:#EBEBEB;--bord2:#F5F5F5;
}
/* NAV */
.nav{background:#F8F8F8;border-bottom:1px solid var(--bord);display:flex;align-items:center;position:sticky;top:0;z-index:100;padding:0 14px;height:47px;gap:0;}
.nav-logo{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.nav-title{font-size:13px;font-weight:700;color:#111;white-space:nowrap;}
.nav-title span{color:var(--or);}
.desk-tabs{display:none;margin-left:12px;gap:0;}
.desk-tab{color:#CCC;padding:0 11px;font-size:12px;font-weight:500;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;height:47px;white-space:nowrap;}
.desk-tab.on{color:#111;border-bottom-color:var(--or);font-weight:600;}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.bell-wrap{position:relative;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.bell-dot{width:8px;height:8px;border-radius:50%;background:var(--rouge);position:absolute;top:2px;right:2px;border:2px solid #F8F8F8;display:none;}
.bell-dot.show{display:block;}
.user-chip{display:flex;align-items:center;gap:5px;background:var(--orl);border:1px solid var(--orb);border-radius:20px;padding:3px 9px 3px 3px;cursor:pointer;}
.u-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
.u-nm{font-size:10px;font-weight:600;color:var(--or);}
/* TABBAR MOBILE */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#F8F8F8;border-top:1px solid var(--bord);display:flex;align-items:center;justify-content:space-around;padding:6px 0 max(12px,env(safe-area-inset-bottom));z-index:100;}
.tb{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;min-width:46px;border:none;background:none;padding:0;position:relative;}
.tb-ico{font-size:8px;font-weight:500;color:#CCC;}
.tb-ico.on{color:var(--or);}
.fab{width:46px;height:46px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;margin-top:-16px;border:3px solid #F8F8F8;flex-shrink:0;}
.fab-lbl{font-size:8px;font-weight:500;color:var(--or);margin-top:1px;}
.act-dot{width:7px;height:7px;background:var(--rouge);border-radius:50%;position:absolute;top:0;right:3px;border:2px solid #F8F8F8;display:none;}
.act-dot.show{display:block;}
/* DESKTOP */
@media(min-width:768px){
  body{padding-bottom:0;}
  .desk-tabs{display:flex;}
  .tabbar{display:none;}
  .pg{padding:20px 28px;}
}
/* PAGES */
.pg{display:none;padding:14px;}
.pg.on{display:block;}
.pg-fiche{display:none;}
.pg-fiche.on{display:block;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;}
.login-card{background:#1A1A1A;border-radius:18px;padding:26px 22px;width:100%;max-width:340px;border:1px solid #2A2A2A;}
.user-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;border:1px solid #2A2A2A;background:#111;cursor:pointer;margin-bottom:8px;width:100%;text-align:left;}
.user-btn:hover{border-color:var(--or);}
.u-btn-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.pin-row{display:flex;gap:10px;justify-content:center;margin:14px 0 16px;}
.pin-box{width:48px;height:56px;background:#111;border:1px solid #2A2A2A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;}
.pin-box.f{border-color:var(--or);color:var(--or);}
.pin-box.err{border-color:var(--rouge);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{background:#111;border:1px solid #2A2A2A;border-radius:9px;padding:14px;font-size:19px;color:#fff;cursor:pointer;text-align:center;}
.pin-key:active{background:#1f1f1f;transform:scale(.94);}
/* COMPOSANTS */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border:1px solid var(--bord);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.kpi{padding:11px 4px;text-align:center;border-right:1px solid var(--bord2);}
.kpi:last-child{border-right:none;}
.kv{font-size:19px;font-weight:700;letter-spacing:-1px;line-height:1;display:block;}
.kl{font-size:7px;color:#CCC;margin-top:3px;text-transform:uppercase;letter-spacing:.04em;display:block;}
.card{background:var(--card);border:1px solid var(--bord);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bord2);}
.card-title{font-size:13px;font-weight:700;color:#111;}
.card-link{font-size:11px;color:var(--or);font-weight:600;cursor:pointer;border:none;background:none;padding:0;}
.item-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bord2);gap:8px;cursor:pointer;}
.item-row:last-child{border-bottom:none;}
.item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-nom{font-size:13px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-sub{font-size:10px;color:#999;margin-top:2px;}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;}
.pill-r{background:var(--rougel);color:var(--rouge);border:1px solid var(--rougeb);}
.pill-o{background:var(--orangel);color:var(--orange);border:1px solid var(--orangeb);}
.pill-g{background:var(--vertl);color:var(--vert);border:1px solid var(--vertb);}
.pill-or{background:var(--orl);color:var(--or);border:1px solid var(--orb);}
.pill-n{background:#F5F5F5;color:#777;border:1px solid #E0E0E0;}
.pill-v{background:#F5F3FF;color:#5B21B6;border:1px solid #C4B5FD;}
.tf{background:#111;color:var(--or);padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;}
.frow{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.frow::-webkit-scrollbar{display:none;}
.fp{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid;cursor:pointer;}
.fp.on{background:#111;color:var(--or);border-color:#111;}
.fp.off{background:var(--card);color:#999;border-color:var(--bord);}
.srch-wrap{position:relative;margin-bottom:12px;}
.srch{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px 14px;}
.srch input{border:none;outline:none;font-size:12px;color:#111;flex:1;background:transparent;}
.srch input::placeholder{color:#CCC;}
.srch-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--bord);border-radius:10px;z-index:200;max-height:200px;overflow-y:auto;margin-top:3px;display:none;}
.srch-drop.open{display:block;}
.srch-opt{padding:10px 14px;font-size:12px;color:#111;cursor:pointer;border-bottom:1px solid var(--bord2);}
.srch-opt:last-child{border-bottom:none;}
.srch-opt:hover{background:#FAFAFA;}
/* MAGASINS */
.mag-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bord);border-left:3px solid;border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;}
.mag-card.r{border-left-color:var(--rouge);}
.mag-card.o{border-left-color:var(--orange);}
.mag-card.g{border-left-color:var(--vert);}
.mag-info{flex:1;min-width:0;}
.mag-nm{font-size:13px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mag-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2.5px solid;flex-shrink:0;flex-direction:column;}
.sr-r{color:var(--rouge);border-color:var(--rougeb);}
.sr-o{color:var(--orange);border-color:var(--orangeb);}
.sr-g{color:var(--vert);border-color:var(--vertb);}
/* FICHE */
.fiche-nav{background:#111;padding:10px 14px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:50;border-bottom:2px solid var(--or);}
.fiche-back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid #333;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.fiche-info{flex:1;min-width:0;}
.fiche-nom{font-size:13px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fiche-badges{display:flex;gap:4px;align-items:center;margin-top:2px;}
.fiche-code{background:rgba(201,146,26,.15);color:var(--or);padding:1px 6px;border-radius:4px;font-size:8px;font-weight:700;border:1px solid rgba(201,146,26,.3);}
.fiche-statut{padding:1px 7px;border-radius:4px;font-size:8px;font-weight:700;}
.fiche-btn{background:var(--or);border:none;color:#fff;border-radius:6px;padding:7px 11px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border:1px solid var(--bord);border-radius:12px;overflow:hidden;margin:10px 14px;}
.stat{padding:10px 4px;text-align:center;border-right:1px solid var(--bord2);}
.stat:last-child{border-right:none;}
.stat-v{font-size:18px;font-weight:700;display:block;line-height:1;}
.stat-l{font-size:8px;color:#CCC;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;display:block;}
/* SECTIONS FICHE */
.fs-wrap{padding:0 14px 80px;}
.fs{border:1px solid var(--bord);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.fs-hdr{background:#111;color:var(--or);padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;}
.fs-edit-btn{background:rgba(201,146,26,.12);border:1px solid rgba(201,146,26,.25);color:var(--or);border-radius:5px;padding:2px 9px;font-size:9px;cursor:pointer;}
.fs-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;border-bottom:1px solid var(--bord2);}
.fs-row:last-child{border-bottom:none;}
.fs-lbl{font-size:11px;color:#777;flex-shrink:0;margin-right:8px;}
.fs-val{font-size:12px;font-weight:500;color:#111;text-align:right;word-break:break-word;}
.fs-val.or{color:var(--or);}
.fs-val a{color:var(--vert);}
.h-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:8px 12px;}
.h-cell{text-align:center;background:#F8F8F8;border:1px solid var(--bord);border-radius:6px;padding:5px 2px;}
.h-cell.off{opacity:.35;}
.h-jl{font-size:7px;font-weight:700;color:#777;text-transform:uppercase;}
.h-v{font-size:7px;color:#111;margin-top:2px;line-height:1.4;}
.eq-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bord2);}
.eq-row:last-child{border-bottom:none;}
.eq-av{width:28px;height:28px;border-radius:50%;background:var(--orl);border:1px solid var(--orb);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--or);flex-shrink:0;}
.eq-body{flex:1;min-width:0;}
.eq-nm{font-size:11px;font-weight:600;color:#111;}
.eq-ct{font-size:9px;color:#999;margin-top:1px;}
.eq-tel{font-size:10px;color:var(--vert);white-space:nowrap;flex-shrink:0;}
.liv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 12px;}
.liv-cell{background:#F8F8F8;border:1px solid var(--bord);border-radius:8px;padding:9px;}
.liv-title{font-size:9px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.liv-row{display:flex;justify-content:space-between;align-items:center;margin-top:3px;}
.liv-lbl{font-size:9px;color:#999;}
.liv-val{font-size:10px;font-weight:500;color:#111;}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px;}
.perf-c{background:#111;border-radius:8px;padding:9px;}
.perf-lbl{font-size:8px;color:#555;margin-bottom:3px;}
.perf-val{font-size:14px;font-weight:700;color:#fff;}
.perf-evo{font-size:9px;margin-top:2px;}
.visite-item-fiche{padding:9px 12px;border-bottom:1px solid var(--bord2);cursor:pointer;}
.visite-item-fiche:last-child{border-bottom:none;}
.visite-item-fiche:hover{background:#FAFAFA;}
/* FORMULAIRE */
.fsec{background:var(--card);border:1px solid var(--bord);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.fsec-hdr{background:#111;color:var(--or);padding:9px 14px;font-size:10px;font-weight:700;border-bottom:1px solid var(--or);}
.ff{padding:11px 14px;border-bottom:1px solid var(--bord2);}
.ff:last-child{border-bottom:none;}
.fl{font-size:12px;font-weight:600;color:#111;margin-bottom:7px;display:block;}
.req{color:var(--rouge);margin-left:2px;}
input[type=text],input[type=date],input[type=number],input[type=tel],select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--bord);border-radius:8px;
  font-size:12px;color:#111;background:#FAFAFA;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--or);background:#fff;}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:7px 12px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid var(--bord);background:var(--card);color:#666;cursor:pointer;}
.chip.on{background:#111;color:var(--or);border-color:#111;}
.chip.on-g{background:var(--vertl);color:var(--vert);border-color:var(--vertb);}
.chip.on-r{background:var(--rougel);color:var(--rouge);border-color:var(--rougeb);}
.chip.on-o{background:var(--orangel);color:var(--orange);border-color:var(--orangeb);}
/* BOUTONS */
.btn-p{display:block;width:100%;background:#111;color:var(--or);border:1px solid var(--or);border-radius:9px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;margin-top:10px;}
.btn-g{background:var(--card);color:#666;border:1px solid var(--bord);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-sr{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--orangeb);background:var(--orangel);color:var(--orange);cursor:pointer;}
.btn-sg{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--vertb);background:var(--vertl);color:var(--vert);cursor:pointer;}
.btn-sn{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid var(--bord);background:var(--card);color:#777;cursor:pointer;}
/* ACTIONS */
.ac-card{background:var(--card);border:1px solid var(--bord);border-left:3px solid;border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;}
.ac-card.r{border-left-color:var(--rouge);}
.ac-card.o{border-left-color:var(--orange);}
.ac-card.g{border-left-color:var(--vert);}
.ac-body{padding:10px 14px 6px;}
.ac-desc{font-size:12px;font-weight:700;color:#111;margin-bottom:6px;}
.ac-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:0 14px 8px;}
.ac-alerte{background:var(--rougel);border-top:1px solid var(--bord2);padding:6px 14px;font-size:9px;color:var(--rouge);font-weight:700;display:flex;align-items:center;gap:5px;}
.ac-btns{display:flex;gap:5px;padding:6px 14px 10px;border-top:1px solid var(--bord2);}
.cfm{background:#FAFAFA;border-top:1px solid var(--bord2);padding:11px 14px;}
.cfm-t{font-size:11px;font-weight:700;color:#111;margin-bottom:3px;}
.cfm-s{font-size:10px;color:#999;margin-bottom:9px;}
.cfm-row{display:flex;gap:7px;}
.cfm-ann{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:8px;padding:9px;font-size:11px;color:#666;cursor:pointer;}
.cfm-ok{flex:1;background:#111;border:none;border-radius:8px;padding:9px;font-size:11px;color:#fff;font-weight:700;cursor:pointer;}
/* MODALES */
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;border-top:3px solid var(--or);}
.modal h3{font-size:15px;font-weight:700;color:#111;margin-bottom:14px;}
@media(min-width:768px){.modal-ov{align-items:center;}.modal{border-radius:16px;max-height:85vh;}}
/* LOADING */
.lov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.75);z-index:400;align-items:center;justify-content:center;}
.lov.open{display:flex;}
.lbox{background:var(--card);border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;border:1px solid var(--bord);}
.spin{width:34px;height:34px;border:3px solid var(--bord);border-top-color:var(--or);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
/* DIVERS */
.empty{text-align:center;color:#CCC;padding:24px;font-size:12px;}
.succ{background:var(--vertl);border-radius:9px;padding:12px;font-size:12px;color:var(--vert);font-weight:500;text-align:center;border:1px solid var(--vertb);margin-top:10px;display:none;}
.alerte-banner{background:var(--rougel);border:1px solid var(--rougeb);border-left:3px solid var(--rouge);border-radius:9px;padding:9px 13px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--rouge);display:flex;align-items:center;gap:7px;}
/* ADMIN */
.admin-sec{background:var(--card);border:1px solid var(--bord);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.admin-hdr{background:#111;color:var(--or);padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.admin-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--bord2);gap:10px;}
.admin-row:last-child{border-bottom:none;}
/* DETAIL MODAL */
.det-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bord2);}
.det-row:last-child{border-bottom:none;}
.det-lbl{font-size:11px;color:#777;}
.det-val{font-size:12px;font-weight:500;color:#111;text-align:right;max-width:65%;}
</style>
</head>
<body>

<div class="lov" id="lov"><div class="lbox"><div class="spin"></div><div style="font-size:12px;color:#777;">Chargement...</div></div></div>

<!-- LOGIN -->
<div id="login">
<div class="login-wrap">
<div class="login-card">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
      <path d="M4 8L8 8L12 21L24 21L27 11L10 11" stroke="#C9921A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="13" cy="25" r="2.2" fill="#C9921A"/>
      <circle cx="22" cy="25" r="2.2" fill="#C9921A"/>
      <circle cx="24" cy="7" r="6" fill="#C9921A"/>
      <text x="24" y="10.5" text-anchor="middle" font-size="7" font-weight="700" fill="#111">!</text>
    </svg>
    <div><div style="font-size:15px;font-weight:700;color:#fff;">MONITEUR</div><div style="font-size:9px;color:#C9921A;letter-spacing:.08em;">DES VENTES</div></div>

<script>
var SB_URL='https://btzwrdjgngfpsutegmci.supabase.co';
var SB_KEY='sb_publishable_0vlIW4o7tI847aAQ_8UYsg_FrC3w-Z4';

function sbFetch(path,opts){
  var o=opts||{};
  o.headers=Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},o.headers||{});
  return fetch(SB_URL+'/rest/v1/'+path,o).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(t);});
    var ct=r.headers.get('content-type')||'';
    return ct.indexOf('json')>-1?r.json():r.text();
  });
}

var MAGS=[],HISTO=[],ACTS=[],PERFS=[],USERS=[],PARAMS={},TOUR=[];
var TODAY='',MOIS='';
var CU=null,PIN_BUF='',PIN_USR=null,C={},MAD_ROW=null,MAD_ACT=null;
var CUR_F='tous',CUR_ACT_F='tous';
var EDIT_MAG_CODE=null;
var USER_COULEUR='#C9921A';

function fmtDate(d){if(!d)return '';var dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return '';return dt.toLocaleDateString('fr-FR');}
function fmtEuro(v){if(!v&&v!==0)return '--';return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);}

function calcScore(j,freq,nbAct,dern){
  // Score risque pour tri tournée (hors score /100 audit)
  var s=0;
  if(j>freq*1.5)s+=2;else if(j>freq)s+=1;
  if(nbAct>=3)s+=2;else if(nbAct>=1)s+=1;
  if(dern==='Mauvais')s+=2;else if(dern==='Moyen')s+=1;
  return Math.min(s,4);
}

function calcScoreAudit(criteres){
  // Score /100 basé uniquement sur l'audit de conformité
  // Hygiène & sécu : 35 pts max
  // Commerce & merchandising : 30 pts max
  // Gestion & organisation : 20 pts max
  // État général : 15 pts max
  if(!criteres) return null;
  var score=100;
  var map={
    haccp:     {ok:0,partiel:18,ko:35},
    dlc:       {ok:0,partiel:8,ko:16},
    proprete:  {ok:0,partiel:3,ko:6},
    // Attention : pour hygiène le total max dégradation = 35 si tout mauvais
    // mais on plafonne par catégorie
    ruptures:  {ok:0,partiel:8,ko:15},
    lineaire:  {ok:0,partiel:5,ko:10},
    promo:     {ok:0,partiel:2,ko:5},
    commandes: {ok:0,partiel:5,ko:10},
    stocks:    {ok:0,partiel:3,ko:7},
    autonomie: {ok:0,partiel:5,ko:3},// autonomie : bonus si bon
    etat_general:{ok:0,partiel:5,ko:10},
    reserve:   {ok:0,partiel:2,ko:5}
  };
  var keys=Object.keys(map);
  keys.forEach(function(k){
    var v=criteres[k]||'';
    var koWords=['Non conforme','Non respecté','Absent','Grave','Problématique','Non suivie','+4','Désordre','Insuffisant','Mauvais'];
    var partWords=['Partiel','Quelques','À améliorer','Partielle','Acceptable','Moyen','1-3'];
    var isKo=koWords.some(function(w){return v.indexOf(w)>-1||v==='+4';});
    var isPart=partWords.some(function(w){return v.indexOf(w)>-1;});
    if(k==='autonomie'){
      if(v.indexOf('Autonome')>-1)score+=3;
      else if(isPart)score-=3;
      else if(isKo)score-=5;
    } else {
      if(isKo)score-=map[k].ko;
      else if(isPart)score-=map[k].partiel;
    }
  });
  return Math.max(0,Math.min(100,score));
}

function buildTour(){
  var now=new Date();
  var t=MAGS.filter(function(m){return m.statut==='Actif'||m.statut==='Surveillance';}).map(function(mg){
    var dv=null,de='';
    for(var i=0;i<HISTO.length;i++){if(HISTO[i].code===mg.code){dv=HISTO[i].dateRaw;de=HISTO[i].etat;break;}}
    var j=dv?Math.floor((now-dv)/864e5):999;
    var acts=ACTS.filter(function(a){return a.code===mg.code;});
    var sc=calcScore(j,mg.freq_n||14,acts.length,de);
    var hasAlerte=acts.some(function(a){return a.alerte;});
    return{code:mg.code,nom:mg.nom,ville:mg.ville,jours:j,score:sc,nbActs:acts.length,dernEtat:de,statut:mg.statut,hasAlerte:hasAlerte};
  });
  t.sort(function(a,b){return b.score!==a.score?b.score-a.score:b.jours-a.jours;});
  return t;
}

function loadData(){
  showL(true);
  var now=new Date();
  TODAY=now.toISOString().substring(0,10);
  MOIS=('0'+(now.getMonth()+1)).slice(-2)+'/'+now.getFullYear();
  Promise.all([
    sbFetch('magasins?order=nom'),
    sbFetch('visites?order=date.desc&limit=500'),
    sbFetch('actions?statut=neq.Cloture&order=date.asc'),
    sbFetch('performances?order=mois.desc'),
    sbFetch('utilisateurs?actif=eq.true'),
    sbFetch('parametres')
  ]).then(function(res){
    MAGS=res[0]||[];
    var n2=new Date();
    HISTO=(res[1]||[]).map(function(v){v.dateRaw=new Date(v.date).getTime();v.dateStr=fmtDate(v.date);return v;});
    ACTS=(res[2]||[]).map(function(a){a.age=Math.floor((n2-new Date(a.date))/864e5);a.desc=a.description||'';return a;});
    PERFS=res[3]||[];
    USERS=res[4]||[];
    PARAMS={};(res[5]||[]).forEach(function(p){PARAMS[p.cle]=p.valeur;});
    TOUR=buildTour();
    showL(false);
    try{var s=localStorage.getItem('crm_v2');if(s){var u=JSON.parse(s);if(USERS.some(function(x){return x.nom===u.nom;})){CU=u;startApp();return;}}}catch(e){}
    buildLogin();
  }).catch(function(err){
    showL(false);
    document.getElementById('login').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;"><div style="background:#1A1A1A;border-radius:18px;padding:24px;border:1px solid #D94040;max-width:340px;width:100%;text-align:center;"><div style="font-size:30px;margin-bottom:12px;">⚠</div><div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;">Erreur de connexion</div><div style="font-size:11px;color:#D94040;">'+err.message+'</div><button onclick="location.reload()" style="margin-top:14px;background:#C9921A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12px;cursor:pointer;font-weight:700;">Réessayer</button></div></div>';
  });
}

function buildLogin(){
  var sub=g('login-sub');if(sub&&PARAMS.SECTEUR)sub.textContent=PARAMS.SECTEUR;
  var h='';
  USERS.forEach(function(u){
    var ini=u.nom.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
    h+='<button class="user-btn" data-idx="'+USERS.indexOf(u)+'" onclick="selectUserBtn(this)">'+
      '<div class="u-btn-av" style="background:'+u.couleur+';">'+ini+'</div>'+
      '<div><div style="font-size:13px;font-weight:700;color:#DDD;">'+u.nom+'</div><div style="font-size:10px;color:#555;">'+u.role+' · '+u.secteur+'</div></div></button>';
  });
  if(!h)h='<div style="color:#555;font-size:11px;text-align:center;padding:12px;">Aucun utilisateur — vérifiez Supabase.</div>';
  g('step1').innerHTML=h;
}
function selectUserBtn(btn){var u=USERS[parseInt(btn.getAttribute('data-idx'))];if(!u)return;var ini=u.nom.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();selectUser(u.nom,ini,u.couleur,u.role,u.secteur||'');}
function selectUser(nom,ini,couleur,role,secteur){
  PIN_USR={nom:nom,ini:ini,couleur:couleur,role:role,secteur:secteur};PIN_BUF='';
  g('pin-lbl').textContent=nom+' — PIN';
  for(var i=0;i<4;i++){var p=g('pb'+i);p.textContent='';p.className='pin-box';}
  g('step1').style.display='none';g('step2').style.display='block';g('pin-err').textContent='';
}
function pk(c){if(PIN_BUF.length>=4)return;PIN_BUF+=c;var p=g('pb'+(PIN_BUF.length-1));p.textContent='·';p.classList.add('f');if(PIN_BUF.length===4)setTimeout(verifyPin,200);}
function pdel(){if(!PIN_BUF.length)return;PIN_BUF=PIN_BUF.slice(0,-1);var p=g('pb'+PIN_BUF.length);p.textContent='';p.className='pin-box';}
function pcancel(){PIN_BUF='';PIN_USR=null;g('step2').style.display='none';g('step1').style.display='block';}
function verifyPin(){
  var ok=USERS.some(function(u){return u.nom===PIN_USR.nom&&u.pin===PIN_BUF;});
  if(ok){CU=PIN_USR;try{localStorage.setItem('crm_v2',JSON.stringify(CU));}catch(e){}startApp();}
  else{for(var i=0;i<4;i++)g('pb'+i).className='pin-box err';g('pin-err').textContent='Code incorrect';PIN_BUF='';setTimeout(function(){for(var i=0;i<4;i++){var p=g('pb'+i);p.textContent='';p.className='pin-box';}},1200);}
}
function startApp(){
  g('login').style.display='none';g('app').style.display='block';
  var av=g('user-av');if(av){av.style.background=CU.couleur;av.textContent=CU.ini;}
  var nm=g('user-nm');if(nm)nm.textContent=CU.nom.split(' ')[0];
  var nbAl=ACTS.filter(function(a){return a.alerte;}).length;
  if(nbAl>0){var bd=g('bell-dot');if(bd)bd.classList.add('show');var ad=g('act-dot');if(ad)ad.classList.add('show');}
  // Afficher onglet Admin si rôle Admin
  if(CU.role==='Admin'){
    var dt=g('dt-admin');if(dt)dt.style.display='';
  }
  buildAccueil();buildMagasins();buildVisite();buildActions();buildParams();buildAdmin();
  nav('accueil');
}
function deconnexion(){
  try{localStorage.removeItem('crm_v2');}catch(e){}
  CU=null;PIN_BUF='';PIN_USR=null;
  g('app').style.display='none';g('login').style.display='block';
  g('step2').style.display='none';g('step1').style.display='block';
}

var PAGES=['accueil','magasins','visite','actions','params','admin','fiche'];
function nav(name){

  var pg=g('pg-'+name);if(pg){pg.style.display='block';pg.classList.add('on');}

    var dt=g('dt-'+t);if(dt)dt.classList[t===name?'add':'remove']('on');
  });
  ['accueil','magasins','actions','params'].forEach(function(t){
    var si=g('si-'+t),sl=g('sl-'+t),on=(t===name);
    if(si)si.style.stroke=on?'#C9921A':'#CCC';
    if(sl)sl.className='tb-ico'+(on?' on':'');
  });
  window.scrollTo(0,0);
  if(name==='magasins')filterMags();
}

// ACCUEIL
function buildAccueil(){
  var prenom=CU?CU.nom.split(' ')[0]:'Moniteur';
  var now=new Date();
  var jours=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var moisN=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  var debut=new Date();debut.setDate(1);debut.setHours(0,0,0,0);
  var nbVis=HISTO.filter(function(h){return h.dateRaw>=debut.getTime();}).length;
  var nbActifs=MAGS.filter(function(m){return m.statut==='Actif';}).length;
  var nbAl=ACTS.filter(function(a){return a.alerte;}).length;
  var h='<div style="margin-bottom:12px;">';
  h+='<div style="font-size:19px;font-weight:700;color:#111;letter-spacing:-.02em;">Bonjour '+prenom+' 👋</div>';
  h+='<div style="font-size:11px;color:#999;margin-top:2px;">'+jours[now.getDay()]+' '+now.getDate()+' '+moisN[now.getMonth()]+' · '+(PARAMS.SECTEUR||'Bassin de Thau')+'</div></div>';
  h+='<div class="kpi-row">';
  h+=mkKpi(icoMag('#C9921A'),nbActifs,'Magasins','#C9921A');
  h+=mkKpi(icoAl('#D07030'),ACTS.length,'Actions',ACTS.length>0?'#D07030':'#111');
  h+=mkKpi(icoCal('#777'),nbVis,'Visites','#111');
  h+=mkKpi(icoChk(nbAl>0?'#D94040':'#2E8050'),nbAl>0?nbAl:'OK',nbAl>0?'Alertes':'Conf.',nbAl>0?'#D94040':'#2E8050');
  h+='</div>';
  // Perf secteur
  var pm=PERFS.filter(function(p){return p.mois===MOIS;});
  if(pm.length>0){
    var ca26=0,ca25=0,dmq=0,cli26=0,cli25=0;
    pm.forEach(function(p){ca26+=p.ca_2026||0;ca25+=p.ca_2025||0;dmq+=p.dmq_montant||0;cli26+=p.nb_cli_2026||0;cli25+=p.nb_cli_2025||0;});
    var evo=ca25>0?Math.round((ca26-ca25)/ca25*1000)/10:null;
    var evoCli=cli25>0?Math.round((cli26-cli25)/cli25*1000)/10:null;
    var dmqPct=ca26>0?Math.round(dmq/ca26*10000)/100:0;
    var dmqS=parseFloat(PARAMS.DMQ_SEUIL)||2,dmqA=parseFloat(PARAMS.DMQ_ALERTE)||4;
    var dmqCol=dmqPct>dmqA?'#D94040':dmqPct>dmqS?'#D07030':'#2E8050';
    h+='<div class="card"><div class="card-hdr"><span class="card-title">Performance secteur — '+MOIS+'</span></div>';
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 14px;">';
    h+='<div style="background:#111;border-radius:9px;padding:10px;"><div class="perf-lbl">CA cumulé</div><div class="perf-val">'+fmtEuro(ca26)+'</div>';
    if(evo!==null)h+='<div class="perf-evo" style="color:'+(evo>=0?'#2E8050':'#D94040')+';">'+(evo>=0?'▲':'▼')+' '+(evo>=0?'+':'')+evo+'% vs N-1</div>';
    h+='</div>';
    h+='<div style="background:#111;border-radius:9px;padding:10px;"><div class="perf-lbl">Fréquentation</div>';
    h+='<div class="perf-val">'+(cli26>0?cli26.toLocaleString('fr-FR'):'—')+'</div>';
    if(evoCli!==null)h+='<div class="perf-evo" style="color:'+(evoCli>=0?'#2E8050':'#D94040')+';">'+(evoCli>=0?'▲':'▼')+' '+(evoCli>=0?'+':'')+evoCli+'% vs N-1</div>';
    h+='</div>';
    h+='<div style="background:#111;border-radius:9px;padding:10px;"><div class="perf-lbl">Démarque moy.</div>';
    h+='<div class="perf-val" style="color:'+dmqCol+';">'+dmqPct.toFixed(1)+'%</div>';
    h+='<div class="perf-evo" style="color:#555;">Seuil '+dmqS+'% · Alerte '+dmqA+'%</div></div></div></div>';
  }
  // Magasins à visiter
  h+='<div class="card"><div class="card-hdr"><span class="card-title">Magasins à visiter</span><button class="card-link" onclick="nav(\'magasins\')">Voir tout</button></div>';
  if(!TOUR.length)h+='<div class="empty">Aucun magasin actif</div>';
  else TOUR.slice(0,5).forEach(function(mr){
    var sc=mr.score>=2?'URGENT':mr.score===1?'À RISQUE':'CONFORME';
    var pc=mr.score>=2?'pill-r':mr.score===1?'pill-o':'pill-g';
    var dot=mr.score>=2?'#D94040':mr.score===1?'#D07030':'#2E8050';
    var sub=(mr.jours===999?'Jamais visité':mr.jours+'j sans visite')+(mr.hasAlerte?' · ⚠ alerte':'')+(mr.nbActs>0?' · '+mr.nbActs+' action'+(mr.nbActs>1?'s':''):'');
    h+='<div class="item-row" onclick="ouvrirFiche(\''+mr.code+'\')">';
    h+='<div class="item-dot" style="background:'+dot+';"></div>';
    h+='<div class="item-body"><div class="item-nom">'+mr.nom+'</div><div class="item-sub">'+sub+'</div></div>';
    h+='<span class="pill '+pc+'" style="white-space:nowrap;">'+sc+'</span>';
    h+='<span style="color:#CCC;font-size:16px;margin-left:4px;">›</span></div>';
  });
  h+='</div>';
  // Alertes
  var alertes=ACTS.filter(function(a){return a.alerte;});
  if(alertes.length>0){
    h+='<div class="card"><div class="card-hdr"><span class="card-title">Alertes actives</span><button class="card-link" style="color:#D94040;" onclick="nav(\'actions\')">Voir tout</button></div>';
    alertes.slice(0,3).forEach(function(ac,idx){
      var last=idx===Math.min(alertes.length,3)-1;
      h+='<div class="item-row" style="'+(last?'border-bottom:none':'')+'" onclick="ouvrirAction('+ac.id+')">';
      h+='<div style="width:30px;height:30px;border-radius:50%;background:#FDF0F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+icoAl('#D94040')+'</div>';
      h+='<div class="item-body"><div class="item-nom">'+ac.mag+'</div><div class="item-sub">'+ac.desc+'</div></div>';
      h+='<span style="font-size:12px;font-weight:700;color:#D94040;">'+ac.age+'j</span></div>';
    });
    h+='</div>';
  }
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">';
  h+='<button class="btn-p" style="margin-top:0;" onclick="genRapport()">📄 Rapport hebdo</button>';
  h+='<button style="background:#2E8050;color:#fff;border:none;border-radius:9px;padding:13px;font-size:12px;font-weight:700;cursor:pointer;" onclick="genRapportIA()">✨ Rapport IA</button>';
  h+='</div>';
  g('pg-accueil').innerHTML=h;
}
function mkKpi(ico,val,lbl,col){return '<div class="kpi"><div style="height:18px;display:flex;align-items:center;justify-content:center;margin-bottom:3px;">'+ico+'</div><span class="kv" style="color:'+col+';">'+val+'</span><span class="kl">'+lbl+'</span></div>';}

// MAGASINS
function buildMagasins(){
  var isDesk=window.innerWidth>=768;
  var h='<div class="frow">';
  h+='<span class="fp on" id="fp-tous" onclick="setF(\'tous\',this)">Tous</span>';
  h+='<span class="fp off" id="fp-risque" onclick="setF(\'risque\',this)">À risque</span>';
  h+='<span class="fp off" id="fp-conforme" onclick="setF(\'conforme\',this)">Conformes</span>';
  h+='</div>';
  h+='<div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
  h+='<input id="mag-search" placeholder="Nom, code TF, ville..." oninput="filterMags()"></div>';
  h+='<div id="mag-count" style="font-size:11px;color:#999;margin-bottom:8px;"></div>';
  if(isDesk){
    // Vue tableau desktop uniquement
    h+='<div style="overflow-x:auto;"><table id="mag-table" style="width:100%;border-collapse:collapse;font-size:12px;">';
    h+='<thead><tr style="background:#FAFAFA;">';
    h+='<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EBEBEB;">Magasin</th>';
    h+='<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EBEBEB;">Statut</th>';
    h+='<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EBEBEB;">Score</th>';
    h+='<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EBEBEB;">Dernière visite</th>';
    h+='<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EBEBEB;">Actions</th>';
    h+='<th style="border-bottom:1px solid #EBEBEB;"></th></tr></thead>';
    h+='<tbody id="mag-tbody"></tbody></table></div>';
  } else {
    h+='<div id="mag-list"></div>';
  }
  g('pg-magasins').innerHTML=h;
}
function setF(f,el){CUR_F=f;document.querySelectorAll('#pg-magasins .fp').forEach(function(p){p.className='fp off';});if(el)el.className='fp on';filterMags();}
function filterMags(){
  var v=(g('mag-search')||{value:''}).value.toLowerCase();
  var list=MAGS.filter(function(m){
    var t=!v||((m.nom||'').toLowerCase().indexOf(v)>-1||(m.code||'').toLowerCase().indexOf(v)>-1||(m.ville||'').toLowerCase().indexOf(v)>-1);
    var tr=TOUR.find(function(t2){return t2.code===m.code;});
    var sc=tr?tr.score:0;
    var f=CUR_F==='tous'?true:CUR_F==='risque'?sc>=1:sc===0;
    return t&&f;
  });
  var cnt=g('mag-count');if(cnt)cnt.textContent=list.length+' magasin(s)';
  var isDesk=window.innerWidth>=768;
  if(isDesk){
    // Tableau desktop
    var tbody=g('mag-tbody');if(!tbody)return;
    var dh='';
    list.forEach(function(mg){
      var tr=TOUR.find(function(t){return t.code===mg.code;});
      var sc=tr?tr.score:0,j=tr?tr.jours:999;
      var scn=Math.max(0,100-sc*20-(j>14?10:0));
      var scCol=sc>=2?'#D94040':sc>=1?'#D07030':'#2E8050';
      var lbl=sc>=2?'URGENT':sc>=1?'À RISQUE':'CONFORME';
      var pc=sc>=2?'pill-r':sc>=1?'pill-o':'pill-g';
      var jTxt=j===999?'Jamais':j+'j';
      var nbA=ACTS.filter(function(a){return a.code===mg.code;}).length;
      dh+='<tr style="cursor:pointer;" onmouseover="this.style.background=\'#FAFAFA\'" onmouseout="this.style.background=\'\'" onclick="ouvrirFiche(\''+mg.code+'\')">';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;">';
      dh+='<div style="font-size:13px;font-weight:700;color:#111;">'+mg.nom+'</div>';
      dh+='<div style="margin-top:2px;display:flex;gap:5px;align-items:center;"><span class="tf">'+mg.code+'</span><span style="font-size:10px;color:#999;">'+mg.ville+'</span></div></td>';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;"><span class="pill '+pc+'">'+lbl+'</span></td>';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;">';
      dh+='<div style="display:flex;align-items:center;gap:8px;">';
      dh+='<span style="font-size:13px;font-weight:700;color:'+scCol+';">'+scn+'</span>';
      dh+='<div style="height:4px;width:60px;background:#EBEBEB;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+scn+'%;background:'+scCol+';border-radius:2px;"></div></div></div></td>';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;font-size:11px;color:#777;">'+jTxt+'</td>';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;"><span style="font-size:11px;font-weight:600;color:'+(nbA>0?'#D07030':'#CCC')+';">'+nbA+(nbA>0?' ouverte'+(nbA>1?'s':''):''+(nbA===0?' —':''))+'</span></td>';
      dh+='<td style="padding:10px 12px;border-bottom:1px solid #F5F5F5;" onclick="event.stopPropagation();">';
      dh+='<div style="display:flex;gap:5px;">';
      dh+='<button onclick="preselectVisite(\''+mg.code+'\')" style="padding:4px 10px;border-radius:6px;border:1px solid #E8D080;background:#FDF7E8;color:#C9921A;font-size:10px;font-weight:700;cursor:pointer;">+ Visite</button></div></td>';
      dh+='</tr>';
    });
    tbody.innerHTML=dh||'<tr><td colspan="6" style="text-align:center;color:#CCC;padding:24px;font-size:12px;">Aucun magasin</td></tr>';
  } else {
    // Cartes mobile
    var ml=g('mag-list');if(!ml)return;
    var h='';
    list.forEach(function(mg){
      var tr=TOUR.find(function(t){return t.code===mg.code;});
      var sc=tr?tr.score:0,j=tr?tr.jours:999;
      var cls=sc>=2?'r':sc>=1?'o':'g';
      var pc=sc>=2?'pill-r':sc>=1?'pill-o':'pill-g';
      var lbl=sc>=2?'URGENT':sc>=1?'À RISQUE':'CONFORME';
      var scn=Math.max(0,100-sc*20-(j>14?10:0));
      var src=sc>=2?'sr-r':sc>=1?'sr-o':'sr-g';
      h+='<div class="mag-card '+cls+'" onclick="ouvrirFiche(\''+mg.code+'\')">';
      h+='<div class="mag-info"><div class="mag-nm">'+mg.nom+'</div>';
      h+='<div class="mag-meta"><span class="tf">'+mg.code+'</span><span style="font-size:10px;color:#999;">'+mg.ville+'</span></div>';
      h+='<div style="margin-top:5px;"><span class="pill '+pc+'">'+lbl+'</span></div></div>';
      h+='<div class="score-ring '+src+'"><span style="font-size:11px;font-weight:700;">'+scn+'</span><span style="font-size:7px;color:#CCC;">/100</span></div>';
      h+='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>';
    });
    ml.innerHTML=h||'<div class="empty">Aucun magasin</div>';
  }
}

// FICHE MAGASIN
function ouvrirFiche(code){
  var mg=MAGS.find(function(m){return m.code===code;});if(!mg)return;
  EDIT_MAG_CODE=code;
  var histo=HISTO.filter(function(h){return h.code===code;});
  var actions=ACTS.filter(function(a){return a.code===code;});
  var perfs=PERFS.filter(function(p){return p.code===code;});
  var now=new Date();
  var dv=histo.length>0?histo[0]:null;
  var jours=dv?Math.floor((now-dv.dateRaw)/864e5):999;
  var score=calcScore(jours,mg.freq_n||14,actions.length,dv?dv.etat:'');
  var slbl=score>=2?'URGENT':score===1?'À RISQUE':'CONFORME';
  var scol=score>=2?'#D94040':score===1?'#D07030':'#2E8050';
  var sbg=score>=2?'#FDF0F0':score===1?'#FEF5EC':'#F0F9F4';
  var pm=perfs.find(function(p){return p.mois===MOIS;})||null;
  var dmqS=parseFloat(PARAMS.DMQ_SEUIL)||2,dmqA=parseFloat(PARAMS.DMQ_ALERTE)||4;
  var days=['L','M','M','J','V','S','D'];
  var hn=[mg.h_lun,mg.h_mar,mg.h_mer,mg.h_jeu,mg.h_ven,mg.h_sam,mg.h_dim];
  var thisMo=histo.filter(function(h){var d=new Date(h.dateRaw);var dm=new Date();dm.setDate(1);dm.setHours(0,0,0,0);return d>=dm;}).length;
  var isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  var addrEnc=encodeURIComponent((mg.adresse||'')+' '+(mg.cp||'')+' '+(mg.ville||''));
  var mapUrl=isMobile?'https://waze.com/ul?q='+addrEnc:'https://maps.google.com/?q='+addrEnc;

  var H='';
  H+='<div class="fiche-nav">';
  H+='<button class="fiche-back" onclick="fermerFiche()">←</button>';
  H+='<div class="fiche-info"><div class="fiche-nom">'+mg.nom+'</div>';
  H+='<div class="fiche-badges"><span class="fiche-code">'+mg.code+'</span>';
  H+='<span class="fiche-statut" style="background:'+sbg+';color:'+scol+';">'+slbl+'</span></div></div>';
  H+='<button class="fiche-btn" onclick="preselectVisite(\''+mg.code+'\')">+ Visite</button>';
  H+='</div>';
  H+='<div class="stats3">';
  H+='<div class="stat"><span class="stat-v">'+histo.length+'</span><span class="stat-l">Visites</span></div>';
  H+='<div class="stat"><span class="stat-v" style="color:#2E8050;">'+thisMo+'</span><span class="stat-l">Ce mois</span></div>';
  H+='<div class="stat"><span class="stat-v" style="color:'+(actions.length>0?'#D07030':'#111')+';">'+actions.length+'</span><span class="stat-l">Actions</span></div>';
  H+='</div>';
  H+='<div class="fs-wrap">';

  // Contacts
  H+='<div class="fs"><div class="fs-hdr">Contacts <button class="fs-edit-btn" onclick="editSection(\'contacts\',\''+code+'\')">✏ Modifier</button></div>';
  H+='<div class="fs-row"><span class="fs-lbl">Gérant</span><span class="fs-val">'+(mg.resp_civ||'')+' '+(mg.resp_nom||'')+' '+(mg.resp_prenom||'')+'</span></div>';
  if(mg.tel)H+='<div class="fs-row"><span class="fs-lbl">Téléphone</span><span class="fs-val"><a href="tel:'+mg.tel+'">'+mg.tel+'</a></span></div>';
  if(mg.adresse)H+='<div class="fs-row"><span class="fs-lbl">Adresse</span><span class="fs-val or"><a href="'+mapUrl+'" target="_blank" style="color:#C9921A;">'+mg.adresse+', '+mg.cp+' '+mg.ville+' ↗</a></span></div>';
  if(mg.date_entree)H+='<div class="fs-row"><span class="fs-lbl">Dans le réseau depuis</span><span class="fs-val">'+mg.date_entree+'</span></div>';
  H+='</div>';

  // Équipe
  var eq=mg.equipe_detail||mg.equipe||'';
  H+='<div class="fs"><div class="fs-hdr">Équipe <button class="fs-edit-btn" onclick="editSection(\'equipe\',\''+code+'\')">✏ Modifier</button></div>';
  if(eq){
    eq.split(';').forEach(function(m){
      var s=m.trim();if(!s)return;
      var parts=s.split(':');var nm=(parts[0]||'').trim();var det=(parts[1]||'').trim();
      var telPart='';var contratPart=det;
      var telMatch=det.match(/\d{2}[\s.-]?\d{2}[\s.-]?\d{2}[\s.-]?\d{2}[\s.-]?\d{2}/);
      if(telMatch){telPart=telMatch[0];contratPart=det.replace(telPart,'').trim().replace(/^[,·\-]/,'').trim();}
      var ini=nm.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
      H+='<div class="eq-row"><div class="eq-av">'+ini+'</div>';
      H+='<div class="eq-body"><div class="eq-nm">'+nm+'</div><div class="eq-ct">'+contratPart+'</div></div>';
      if(telPart)H+='<a href="tel:'+telPart+'" class="eq-tel">'+telPart+'</a>';
      H+='</div>';
    });
  }else{H+='<div class="empty" style="padding:12px;">Aucun membre renseigné</div>';}
  H+='</div>';

  // Horaires
  H+='<div class="fs"><div class="fs-hdr">Horaires <span style="font-size:8px;color:#555;font-weight:400;text-transform:none;margin-left:4px;">Hors saison</span><button class="fs-edit-btn" onclick="editSection(\'horaires\',\''+code+'\')">✏ Modifier</button></div>';
  H+='<div class="h-grid">';
  for(var i=0;i<7;i++){var v=hn[i]||'';var f=!v||v.toLowerCase()==='ferme'||v.toLowerCase()==='fermé';H+='<div class="h-cell'+(f?' off':'')+'"><div class="h-jl">'+days[i]+'</div><div class="h-v">'+(f?'Fermé':v.replace('/','\n'))+'</div></div>';}
  H+='</div>';
  if(mg.pause_dej)H+='<div style="padding:4px 12px 8px;font-size:10px;color:#999;">Coupure midi : '+mg.pause_dej+'</div>';
  H+='</div>';

  // Livraisons 4 familles
  H+='<div class="fs"><div class="fs-hdr">Livraisons &amp; commandes <button class="fs-edit-btn" onclick="editSection(\'livraisons\',\''+code+'\')">✏ Modifier</button></div>';
  H+='<div class="liv-grid">';
  var livFam=[
    {titre:'Sec / Liquide',j:mg.liv_sec_jour,c:mg.liv_sec_cmd},
    {titre:'Frais',j:mg.liv_frais_jour,c:mg.liv_frais_cmd},
    {titre:'Surgelés',j:mg.liv_surge_jour,c:mg.liv_surge_cmd},
    {titre:'Fruits &amp; Légumes',j:mg.liv_fl_jour,c:mg.liv_fl_cmd}
  ];
  livFam.forEach(function(lf){
    H+='<div class="liv-cell"><div class="liv-title">'+lf.titre+'</div>';
    H+='<div class="liv-row"><span class="liv-lbl">Livraison</span><span class="liv-val">'+(lf.j||'—')+'</span></div>';
    H+='<div class="liv-row"><span class="liv-lbl">Commande</span><span class="liv-val">'+(lf.c||'—')+'</span></div></div>';
  });
  H+='</div></div>';

  // Performance
  H+='<div class="fs"><div class="fs-hdr">Performance '+MOIS+' <button class="fs-edit-btn" onclick="ouvrirSaisiePerf(\''+mg.code+'\')">+ Saisir</button></div>';
  if(pm){
    var ec=pm.ca_2025>0?(pm.ca_2026>=pm.ca_2025?'#2E8050':'#D94040'):'#AAA';
    var evo2=pm.ca_2025>0?Math.round((pm.ca_2026-pm.ca_2025)/pm.ca_2025*1000)/10:null;
    var dPct=pm.ca_2026>0?Math.round((pm.dmq_montant||0)/pm.ca_2026*10000)/100:0;
    var dc=dPct>dmqA?'#D94040':dPct>dmqS?'#D07030':'#2E8050';
    H+='<div class="perf-grid">';
    H+='<div class="perf-c"><div class="perf-lbl">CA mensuel</div><div class="perf-val">'+fmtEuro(pm.ca_2026||0)+'</div>';
    if(evo2!==null)H+='<div class="perf-evo" style="color:'+ec+';">'+(evo2>=0?'▲':'▼')+' '+(evo2>=0?'+':'')+evo2+'% vs N-1</div>';
    H+='</div><div class="perf-c"><div class="perf-lbl">Démarque</div><div class="perf-val" style="color:'+dc+';">'+dPct.toFixed(2)+'%</div>';
    H+='<div class="perf-evo" style="color:#555;">Alerte seuil '+dmqA+'%</div></div></div>';
  }else{H+='<div class="empty">Aucune donnée pour '+MOIS+'</div>';}
  H+='</div>';

  // Commentaire / codes accès
  H+='<div class="fs"><div class="fs-hdr">Commentaires &amp; codes accès <button class="fs-edit-btn" onclick="editSection(\'commentaire\',\''+code+'\')">✏ Modifier</button></div>';
  if(mg.notes){H+='<div style="padding:10px 12px;font-size:12px;color:#111;line-height:1.6;white-space:pre-wrap;">'+mg.notes+'</div>';}
  else{H+='<div class="empty" style="padding:12px;">Aucun commentaire</div>';}
  H+='</div>';

  // Actions ouvertes
  if(actions.length>0){
    H+='<div class="fs"><div class="fs-hdr">Actions ouvertes</div>';
    actions.forEach(function(ac){
      var ac_col=ac.age>20?'#D94040':ac.age>8?'#D07030':'#2E8050';
      var isAl=!!(ac.alerte);
      H+='<div class="visite-item-fiche" onclick="ouvrirAction('+ac.id+')">';
      H+='<div style="display:flex;align-items:flex-start;gap:9px;">';
      if(isAl)H+='<span style="font-size:14px;flex-shrink:0;">⚠</span>';
      H+='<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:700;color:#111;">'+ac.desc+'</div>';
      if(ac.alerte)H+='<div style="font-size:10px;color:#D94040;font-weight:700;margin-top:1px;">'+ac.alerte+'</div>';
      H+='<div style="font-size:10px;color:#999;margin-top:2px;">'+fmtDate(ac.date)+'</div></div>';
      H+='<span style="font-size:11px;font-weight:700;color:'+ac_col+';white-space:nowrap;flex-shrink:0;">J+'+ac.age+'</span></div>';
      H+='<div style="font-size:9px;color:#C9921A;margin-top:4px;font-weight:600;">Cliquer pour gérer →</div>';
      H+='</div>';
    });
    H+='</div>';
  }

  // Dernières visites
  if(histo.length>0){
    H+='<div class="fs"><div class="fs-hdr">Dernières visites</div>';
    histo.slice(0,5).forEach(function(v,idx){
      var ec=(v.etat==='Bon'||v.etat==='Tres bon'||v.etat==='Très bon')?'#2E8050':v.etat==='Mauvais'?'#D94040':'#D07030';
      var ebg=(v.etat==='Bon'||v.etat==='Tres bon'||v.etat==='Très bon')?'#F0F9F4':v.etat==='Mauvais'?'#FDF0F0':'#FEF5EC';
      var ico=v.type_visite==='contact'?'📞':'📍';
      var last=idx===Math.min(histo.length,5)-1;
      H+='<div class="visite-item-fiche" style="'+(last?'':'')+'border-bottom:'+(last?'none':'1px solid #F5F5F5;')+'" onclick="voirDetailVisite('+v.dateRaw+',\''+code+'\')">';
      H+='<div style="display:flex;align-items:center;gap:9px;">';
      H+='<div style="font-size:10px;font-weight:700;color:#111;width:38px;flex-shrink:0;">'+(v.dateStr||'').substring(0,5)+'</div>';
      H+='<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;color:#111;">'+ico+' '+(v.motif||'Visite')+'</div>';
      H+='<div style="font-size:10px;color:#999;">'+(v.moniteur||'')+(v.cr?' · '+v.cr.substring(0,40)+(v.cr.length>40?'...':''):'')+'</div></div>';
      if(v.etat)H+='<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+ebg+';color:'+ec+';white-space:nowrap;">'+v.etat+'</span>';
      H+='</div><div style="font-size:9px;color:#C9921A;margin-top:3px;font-weight:600;">Voir détail →</div>';
      H+='</div>';
    });
    H+='</div>';
  }

  H+='</div>';// /fs-wrap
  g('pg-fiche').innerHTML=H;
  nav('fiche');
}

function saveSection(section,code,id){
  var data={};
  if(section==='contacts'){
    data={resp_civ:gv('es-civ'),resp_nom:gv('es-resp-nom'),resp_prenom:gv('es-resp-prenom'),
      tel:gv('es-tel'),adresse:gv('es-adresse'),cp:gv('es-cp'),ville:gv('es-ville'),date_entree:gv('es-entree')};
  }
  if(section==='equipe'){
    var raw=gv('es-equipe');
    data={equipe_detail:raw.split('\n').filter(function(l){return l.trim();}).join(';')};
  }
  if(section==='horaires'){
    data={h_lun:gv('es-h_lun'),h_mar:gv('es-h_mar'),h_mer:gv('es-h_mer'),h_jeu:gv('es-h_jeu'),
      h_ven:gv('es-h_ven'),h_sam:gv('es-h_sam'),h_dim:gv('es-h_dim'),pause_dej:gv('es-pause-dej')};
  }
  if(section==='livraisons'){
    data={liv_sec_jour:gv('es-liv_sec_jour'),liv_sec_cmd:gv('es-liv_sec_cmd'),
      liv_frais_jour:gv('es-liv_frais_jour'),liv_frais_cmd:gv('es-liv_frais_cmd'),
      liv_surge_jour:gv('es-liv_surge_jour'),liv_surge_cmd:gv('es-liv_surge_cmd'),
      liv_fl_jour:gv('es-liv_fl_jour'),liv_fl_cmd:gv('es-liv_fl_cmd')};
  }
  if(section==='commentaire'){data={notes:gv('es-notes')};}
  showL(true);
  sbFetch('magasins?id=eq.'+id,{method:'PATCH',body:JSON.stringify(data)})
    .then(function(rows){
      var r=Array.isArray(rows)?rows[0]:rows;
      var idx=MAGS.findIndex(function(m){return m.id==id;});
      if(idx>-1)MAGS[idx]=Object.assign(MAGS[idx],r);
      showL(false);closeModal('mod-edit-fs');ouvrirFiche(code);
    }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function mkFSec(titre,body){return '<div class="fsec"><div class="fsec-hdr">'+titre+'</div>'+body+'</div>';}
function mkChipsStr(opts,group){return opts.map(function(o){return '<span class="chip" onclick="csel(this,\''+group+'\')">'+o+'</span>';}).join('');}
function csel(el,gr){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C[gr]=el.textContent.trim();}
function setRB(el,v){g('chips-rb').querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C.rb=v;}
function toggleAction(){
  C.hasAction=!C.hasAction;
  var tg=g('toggle-action'),dot=g('toggle-action-dot'),det=g('action-det');
  if(C.hasAction){tg.style.background='#111';dot.style.left='19px';}
  else{tg.style.background='#EBEBEB';dot.style.left='3px';}
  if(det)det.style.display=C.hasAction?'block':'none';
}
function toggleAlerte(){
  C.hasAlerte=!C.hasAlerte;

// Recherche magasin dans visite
function filterMagSearch(){
  var v=(gv('f-mag-search')||'').toLowerCase();
  var drop=g('f-mag-drop');if(!drop)return;
  if(!v){drop.classList.remove('open');return;}
  var found=MAGS.filter(function(m){return (m.statut==='Actif'||m.statut==='Surveillance')&&((m.nom||'').toLowerCase().indexOf(v)>-1||(m.code||'').toLowerCase().indexOf(v)>-1);});
  if(!found.length){drop.innerHTML='<div class="srch-opt" style="color:#999;">Aucun résultat</div>';drop.classList.add('open');return;}
  drop.innerHTML=found.map(function(m){return '<div class="srch-opt" onclick="selectMag(\''+m.code+'\')"><span class="tf">'+m.code+'</span> '+m.nom+'</div>';}).join('');
  drop.classList.add('open');
}
function selectMag(code){
  var mg=MAGS.find(function(m){return m.code===code;});if(!mg)return;
  var inp=g('f-mag-search');if(inp)inp.value=mg.code+' — '+mg.nom;
  var hid=g('f-mag');if(hid)hid.value=mg.code;
  var nom=g('f-mag-nom');if(nom)nom.value=mg.nom;
  var drop=g('f-mag-drop');if(drop)drop.classList.remove('open');

function soumettreVisite(){
  var code=gv('f-mag');if(!code){alert('Choisissez un magasin');return;}
  if(C.typeVisite==='terrain'&&!C.etat){alert("Indiquez l'état général");return;}
  if(C.hasAction&&!gv('f-act')){alert('Décrivez l\'action');return;}
  if(C.hasAlerte&&!gv('f-alerte')){alert('Décrivez l\'alerte');return;}
  showL(true);
  var now=new Date();
  var vData={date:now.toISOString(),code:code,nom:gv('f-mag-nom'),
    motif:C.typeVisite==='contact'?'Contact téléphonique':'Visite terrain',
    etat:C.etat||'',lineaire:C.lineaire||'',procedures:C.procedures||'',
    ruptures:C.ruptures||'',dlc:C.dlc||'',gerant:gv('f-gerant'),
    autonomie:C.autonomie||'',cr:gv('f-cr'),
    moniteur:CU?CU.nom:'',type_visite:C.typeVisite||'terrain',alerte:''};
  var p=Promise.resolve();var actId='';
  if(C.hasAction&&gv('f-act')){
    actId='ACT'+now.getTime();
    var aData={action_id:actId,date:now.toISOString(),code:code,mag:gv('f-mag-nom'),
      description:gv('f-act'),statut:'Ouvert',resp_badge:C.rb||'',alerte:''};
    p=sbFetch('actions',{method:'POST',body:JSON.stringify(aData)}).then(function(rows){
      var nr=Array.isArray(rows)?rows[0]:rows;nr.age=0;nr.desc=nr.description||'';ACTS.push(nr);
    });
  }
  if(C.hasAlerte&&gv('f-alerte')){
    actId='ALR'+now.getTime();
    var alData={action_id:actId,date:now.toISOString(),code:code,mag:gv('f-mag-nom'),
      description:'⚠ ALERTE : '+gv('f-alerte'),statut:'Ouvert',resp_badge:C.rb2||'rb-siege',alerte:gv('f-alerte')};
    p=sbFetch('actions',{method:'POST',body:JSON.stringify(alData)}).then(function(rows){
      var nr=Array.isArray(rows)?rows[0]:rows;nr.age=0;nr.desc=nr.description||'';ACTS.push(nr);
      var bd=g('bell-dot');if(bd)bd.classList.add('show');
      var ad=g('act-dot');if(ad)ad.classList.add('show');
    });
    vData.alerte=gv('f-alerte');
  }
  vData.action_id=actId;
  p.then(function(){return sbFetch('visites',{method:'POST',body:JSON.stringify(vData)});})
  .then(function(rows){
    var nv=Array.isArray(rows)?rows[0]:rows;
    nv.dateRaw=new Date(nv.date).getTime();nv.dateStr=fmtDate(nv.date);
    HISTO.unshift(nv);TOUR=buildTour();
    showL(false);
    var msg=g('v-msg');if(msg)msg.style.display='block';
    C={};C.hasAction=false;C.hasAlerte=false;C.typeVisite='terrain';
    setTimeout(function(){if(msg)msg.style.display='none';buildVisite();buildAccueil();nav('accueil');},2000);
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

  if(!filtered.length){h+='<div class="empty">Aucune'+(CUR_ACT_F!=='tous'?' correspondance':'')+'</div>';g('pg-actions').innerHTML=h;return;}

function doCfm(){
  if(!MAD_ROW||!MAD_ACT)return;
  var note=gv('mad-note');showL(true);var p;
  if(MAD_ACT==='cloturer'){p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Cloture'})});}
  else{
    var ac=ACTS.find(function(a){return a.id==MAD_ROW;});
    var s=(ac&&ac.notes_suivi?ac.notes_suivi+'\n':'')+new Date().toLocaleDateString('fr-FR')+(note?' — '+note:'');
    p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Relance',nb_relances:(ac?(ac.nb_relances||0)+1:1),notes_suivi:s})});
  }
  p.then(function(){
    showL(false);closeModal('mod-action');
    if(MAD_ACT==='cloturer')ACTS=ACTS.filter(function(a){return a.id!=MAD_ROW;});
    else ACTS=ACTS.map(function(a){if(a.id==MAD_ROW){a.statut='Relance';a.nb_relances=(a.nb_relances||0)+1;}return a;});

  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});

  showL(true);

  req.then(function(rows){
    var r=Array.isArray(rows)?rows[0]:rows;
    if(id){var idx=USERS.findIndex(function(u){return u.id==id;});if(idx>-1)USERS[idx]=r;}else USERS.push(r);
    showL(false);closeModal('mod-user');buildAdmin();
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function genRapportIA(){
  var nbAl=ACTS.filter(function(a){return a.alerte;}).length;
  var debut=new Date();debut.setDate(1);debut.setHours(0,0,0,0);
  var vm=HISTO.filter(function(h){return h.dateRaw>=debut.getTime();});
  var pm=PERFS.filter(function(p){return p.mois===MOIS;});
  var ca26=0,ca25=0,cli26=0,cli25=0,dmq=0;
  pm.forEach(function(p){ca26+=p.ca_2026||0;ca25+=p.ca_2025||0;cli26+=p.nb_cli_2026||0;cli25+=p.nb_cli_2025||0;dmq+=p.dmq_montant||0;});
  var dmqPct=ca26>0?Math.round(dmq/ca26*10000)/100:0;
  var evo=ca25>0?Math.round((ca26-ca25)/ca25*1000)/10:null;
  var alertes=ACTS.filter(function(a){return a.alerte;});
  var urgents=TOUR.filter(function(t){return t.score>=2;});
  var lines=[];
  lines.push("Tu es un expert en animation commerciale et gestion de magasins de proximite (Spar, Vival, Casino Proximite).");

  lines.push("DONNEES DU SECTEUR - "+(PARAMS.SECTEUR||"")+" - "+MOIS);

  lines.push("");
  lines.push("PERFORMANCE COMMERCIALE");
  lines.push("CA cumule : "+Math.round(ca26)+"EUR"+(evo!==null?" ("+(evo>=0?"+":"")+evo+"% vs N-1)":""));
  lines.push("Frequentation : "+cli26+" clients");
  lines.push("Demarque moyenne : "+dmqPct.toFixed(2)+"% (seuil alerte "+(PARAMS.DMQ_ALERTE||4)+"%)");
  lines.push("");
  lines.push("ALERTES ACTIVES ("+alertes.length+")");
  alertes.forEach(function(a){lines.push("ALERTE "+a.mag+" : "+a.alerte+" (J+"+a.age+")");});
  lines.push("");
  lines.push("MAGASINS URGENTS ("+urgents.length+")");
  urgents.forEach(function(t){lines.push(t.nom+" ("+t.code+") - "+t.jours+"j sans visite");});
  lines.push("");
  lines.push("ACTIONS EN COURS ("+ACTS.length+")");
  ACTS.slice(0,8).forEach(function(a){lines.push(a.mag+" J+"+a.age+" : "+a.desc);});
  lines.push("");
  lines.push("VISITES CE MOIS ("+vm.length+")");
  vm.slice(0,10).forEach(function(v){lines.push(v.nom+" - "+v.etat+(v.cr?" : "+v.cr.substring(0,60):""));});
  lines.push("");
  lines.push("Genere un rapport professionnel de moniteur des ventes structure ainsi :");
  lines.push("## Synthese de la semaine");
  lines.push("## Analyse commerciale");
  lines.push("## Points critiques a traiter");
  lines.push("## Recommandations terrain");
  lines.push("## Plan d action prioritaire");
  lines.push("");
  lines.push("Sois concret, actionnable, oriente terrain. Utilise le format professionnel d un moniteur des ventes experimente.");
  var context=lines.join("\n");

  var overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:500;padding:16px;overflow-y:auto;display:flex;flex-direction:column;";
  var hdr=document.createElement("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;";
  var title=document.createElement("div");title.style.cssText="font-size:15px;font-weight:700;color:#111;";title.textContent="Rapport IA en cours... \u2728";
  var btnClose=document.createElement("button");btnClose.textContent="Fermer";btnClose.className="btn-g";btnClose.onclick=function(){document.body.removeChild(overlay);};
  hdr.appendChild(title);hdr.appendChild(btnClose);
  var content=document.createElement("div");
  content.style.cssText="flex:1;font-size:13px;line-height:1.7;color:#111;white-space:pre-wrap;background:#FAFAFA;border:1px solid #EBEBEB;border-radius:10px;padding:14px;margin-bottom:10px;min-height:200px;";
  content.textContent="Generation en cours... \u2728";
  var btnCopy=document.createElement("button");btnCopy.textContent="Copier";btnCopy.className="btn-p";btnCopy.style.marginTop="0";
  btnCopy.onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(content.textContent);else{var ta=document.createElement("textarea");ta.value=content.textContent;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}btnCopy.textContent="\u2713 Copie !";};
  overlay.appendChild(hdr);overlay.appendChild(content);overlay.appendChild(btnCopy);
  document.body.appendChild(overlay);

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1200,
      messages:[{role:"user",content:context}]
    })
  }).then(function(r){return r.json();})
  .then(function(data){
    var txt="";
    if(data.content&&data.content[0])txt=data.content[0].text||"";
    if(!txt&&data.error)txt="Erreur API : "+data.error.message;
    content.textContent=txt;
    title.textContent="Rapport IA - "+MOIS;
  }).catch(function(err){
    content.textContent="Erreur : "+err.message;
  });
}

function genRapport(){
  var now=new Date();var sem=Math.ceil((now-new Date(now.getFullYear(),0,1))/(7*864e5));
  var debut=new Date();debut.setDate(1);debut.setHours(0,0,0,0);
  var vm=HISTO.filter(function(h){return h.dateRaw>=debut.getTime();});
  var alertes=ACTS.filter(function(a){return a.alerte;});
  var lignes=['RAPPORT HEBDOMADAIRE — Semaine '+sem,'Moniteur : '+(CU?CU.nom:''),'Secteur : '+(PARAMS.SECTEUR||'Bassin de Thau'),'='.repeat(34),'','INDICATEURS','Visites ce mois : '+vm.length,'Actions ouvertes : '+ACTS.filter(function(a){return !a.alerte;}).length,'Alertes actives : '+alertes.length,''];
  if(alertes.length){lignes.push('⚠ ALERTES ACTIVES');alertes.forEach(function(a){lignes.push('→ '+a.mag+' — '+a.alerte+' (J+'+a.age+')');});lignes.push('');}
  lignes.push('MAGASINS PRIORITAIRES');
  TOUR.filter(function(t){return t.score>=1;}).slice(0,8).forEach(function(t){lignes.push((t.score>=2?'URGENT ':'SUIVI  ')+t.nom+' ('+t.code+') '+t.jours+'j'+(t.hasAlerte?' ⚠':''));});
  lignes.push('','ACTIONS EN COURS');
  ACTS.filter(function(a){return !a.alerte;}).slice(0,10).forEach(function(a){lignes.push((a.age>20?'URGENT ':a.age>8?'SUIVI  ':'OK     ')+a.mag+' J+'+a.age+' — '+a.desc);});
  lignes.push('','Généré le '+now.toLocaleDateString('fr-FR')+' à '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  var txt=lignes.join('\n');
  var wrap=document.createElement('div');wrap.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:500;padding:16px;overflow-y:auto;';
  var btnF=document.createElement('button');btnF.textContent='Fermer';btnF.className='btn-g';btnF.style.marginBottom='10px';btnF.onclick=function(){document.body.removeChild(wrap);};
  var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='width:100%;height:65vh;font-size:12px;line-height:1.7;border:1px solid #EBEBEB;border-radius:9px;padding:12px;font-family:monospace;';
  var btnC=document.createElement('button');btnC.textContent='Copier';btnC.className='btn-p';btnC.style.marginTop='10px';btnC.onclick=function(){ta.select();document.execCommand('copy');btnC.textContent='✓ Copié !';};
  wrap.appendChild(btnF);wrap.appendChild(ta);wrap.appendChild(btnC);document.body.appendChild(wrap);
}
