<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F8F8F8">
<title>Mon CRM</title>
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F8F8F8;min-height:100%;color:#111;}
button,select,input,textarea{font-family:inherit;outline:none;}
a{text-decoration:none;color:inherit;}
svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
img{display:block;}

/* ===== VARIABLES ===== */
:root{
  --or:#C9921A;--or-light:#FDF7E8;--or-border:#E8D080;
  --rouge:#D94040;--rouge-light:#FDF0F0;--rouge-border:#F0C0C0;
  --orange:#D07030;--orange-light:#FEF5EC;--orange-border:#ECC890;
  --vert:#2E8050;--vert-light:#F0F9F4;--vert-border:#98D0B0;
  --bg:#F8F8F8;--card:#fff;--border:#EBEBEB;--border2:#F5F5F5;
  --text:#111;--text2:#666;--text3:#AAA;--text4:#CCC;
}

/* ===== LAYOUT RESPONSIVE ===== */
/* Mobile: tabbar bas, nav top sans onglets */
/* Desktop (>768px): sidebar gauche, nav top avec onglets, pas de tabbar */

/* ===== NAV TOP ===== */
.nav{background:#F8F8F8;border-bottom:1px solid var(--border);display:flex;align-items:stretch;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;padding:10px 14px;text-decoration:none;}
.nav-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.01em;}
.nav-title span{color:var(--or);}
.nav-tabs{display:none;gap:0;margin-left:8px;}
.nav-tab{color:var(--text3);padding:0 12px;font-size:12px;font-weight:500;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;height:46px;white-space:nowrap;transition:color .15s;}
.nav-tab.on{color:var(--text);border-bottom-color:var(--or);font-weight:600;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-right:14px;}
.bell-btn{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;background:transparent;border:none;}
.bell-dot{width:8px;height:8px;border-radius:50%;background:var(--rouge);position:absolute;top:3px;right:3px;border:2px solid #F8F8F8;display:none;}
.bell-dot.show{display:block;}
.user-chip{display:flex;align-items:center;gap:5px;background:var(--or-light);border:1px solid var(--or-border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;}
.user-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.user-nm{font-size:10px;font-weight:600;color:var(--or);}

/* ===== TABBAR MOBILE ===== */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#F8F8F8;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:6px 0 max(16px,env(safe-area-inset-bottom));z-index:100;}
.tb{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;min-width:52px;border:none;background:none;padding:0;}
.tb-ico{font-size:10px;font-weight:500;color:var(--text4);display:block;}
.tb-ico.on{color:var(--or);}
.fab{width:48px;height:48px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;margin-top:-18px;border:3px solid #F8F8F8;cursor:pointer;box-shadow:0 2px 12px rgba(201,146,26,.35);}
.fab-lbl{font-size:8px;font-weight:500;color:var(--or);margin-top:2px;}

/* ===== DESKTOP LAYOUT ===== */
@media(min-width:769px){
  body{padding-bottom:0;display:flex;flex-direction:column;min-height:100vh;}
  .nav-tabs{display:flex;}
  .tabbar{display:none;}
  .app-body{display:flex;flex:1;}
  .sidebar{width:220px;background:#F8F8F8;border-right:1px solid var(--border);padding:12px 8px;flex-shrink:0;position:sticky;top:47px;height:calc(100vh - 47px);overflow-y:auto;}
  .sb-sec{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 10px 5px;}
  .sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .1s;}
  .sb-item:hover{background:var(--card);}
  .sb-item.on{background:var(--or-light);color:var(--or);}
  .sb-item svg{flex-shrink:0;}
  .sb-badge{margin-left:auto;background:var(--rouge-light);color:var(--rouge);padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;}
  .main-content{flex:1;min-width:0;padding:0;}
  .pg{padding:20px 24px;}
  .pg.on{display:block;}
}

/* ===== PAGES ===== */
.pg{display:none;padding:14px;}
.pg.on{display:block;}
.pg-fiche{display:none;}
.pg-fiche.on{display:block;}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;}
.login-card{background:#1A1A1A;border-radius:18px;padding:26px 22px;width:100%;max-width:340px;border:1px solid #2A2A2A;}
.login-title{font-size:19px;font-weight:600;color:#fff;text-align:center;margin-bottom:3px;}
.login-sub{font-size:11px;color:#555;text-align:center;margin-bottom:20px;}
.user-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;border:1px solid #2A2A2A;background:#111;cursor:pointer;margin-bottom:8px;width:100%;text-align:left;transition:border-color .15s;}
.user-btn:hover,.user-btn.sel{border-color:var(--or);}
.user-btn-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.user-btn-nm{font-size:13px;font-weight:600;color:#DDD;}
.user-btn-rl{font-size:10px;color:#555;margin-top:1px;}
.pin-title{font-size:10px;color:#555;text-align:center;margin:14px 0 10px;}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.pin-box{width:48px;height:56px;background:#111;border:1px solid #2A2A2A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;transition:.1s;}
.pin-box.f{border-color:var(--or);color:var(--or);}
.pin-box.err{border-color:var(--rouge);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{background:#111;border:1px solid #2A2A2A;border-radius:9px;padding:14px;font-size:19px;color:#fff;cursor:pointer;text-align:center;transition:.1s;}
.pin-key:active{background:#1f1f1f;transform:scale(.94);}
.pin-err{color:var(--rouge);font-size:11px;text-align:center;margin-top:8px;min-height:16px;}

/* ===== COMPOSANTS ===== */
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.kpi{padding:12px 4px;text-align:center;border-right:1px solid var(--border2);}
.kpi:last-child{border-right:none;}
.kpi-ico{height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.kpi-v{font-size:20px;font-weight:600;letter-spacing:-1px;line-height:1;display:block;}
.kpi-l{font-size:8px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;display:block;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border2);}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-link{font-size:11px;color:var(--or);font-weight:600;cursor:pointer;border:none;background:none;padding:0;}
.card-l{border-left:3px solid;}
.cl-r{border-left-color:var(--rouge);}
.cl-o{border-left-color:var(--orange);}
.cl-g{border-left-color:var(--vert);}

/* Row items */
.item-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border2);gap:9px;cursor:pointer;}
.item-row:last-child{border-bottom:none;}
.item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-nom{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.item-chev{color:var(--text4);font-size:16px;flex-shrink:0;}

/* Badges */
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.02em;}
.pill-r{background:var(--rouge-light);color:var(--rouge);border:1px solid var(--rouge-border);}
.pill-o{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-border);}
.pill-g{background:var(--vert-light);color:var(--vert);border:1px solid var(--vert-border);}
.pill-or{background:var(--or-light);color:var(--or);border:1px solid var(--or-border);}
.pill-n{background:#F5F5F5;color:#777;border:1px solid #E0E0E0;}
.pill-v{background:#F5F3FF;color:#5B21B6;border:1px solid #C4B5FD;}
.tf{background:#111;color:var(--or);padding:2px 7px;border-radius:20px;font-size:8px;font-weight:700;}

/* Filtres */
.frow{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.frow::-webkit-scrollbar{display:none;}
.fp{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid;cursor:pointer;transition:.15s;}
.fp.on{background:#111;color:var(--or);border-color:#111;}
.fp.off{background:var(--card);color:var(--text3);border-color:var(--border);}

/* Recherche */
.srch{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.srch input{border:none;outline:none;font-size:12px;color:var(--text);flex:1;background:transparent;}
.srch input::placeholder{color:var(--text4);}

/* Magasins */
.mag-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-left:3px solid;border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;}
.mag-card.r{border-left-color:var(--rouge);}
.mag-card.o{border-left-color:var(--orange);}
.mag-card.g{border-left-color:var(--vert);}
.mag-info{flex:1;min-width:0;}
.mag-nm{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mag-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.mag-score{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2.5px solid;flex-shrink:0;flex-direction:column;}
.ms-r{color:var(--rouge);border-color:var(--rouge-border);}
.ms-o{color:var(--orange);border-color:var(--orange-border);}
.ms-g{color:var(--vert);border-color:var(--vert-border);}

/* Fiche magasin */
.fiche-nav{background:#111;padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;border-bottom:2px solid var(--or);}
.fiche-back{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid #333;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.fiche-info{flex:1;min-width:0;}
.fiche-nom{font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fiche-badges{display:flex;gap:5px;align-items:center;margin-top:3px;}
.fiche-code{background:rgba(201,146,26,.15);color:var(--or);padding:1px 7px;border-radius:4px;font-size:8px;font-weight:700;border:1px solid rgba(201,146,26,.3);}
.fiche-statut{padding:1px 8px;border-radius:4px;font-size:8px;font-weight:700;}
.fiche-btn{background:var(--or);border:none;color:#fff;border-radius:7px;padding:8px 13px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;}
.fiche-edit-btn{background:rgba(255,255,255,.08);border:1px solid #444;color:#fff;border-radius:7px;padding:7px 11px;font-size:10px;cursor:pointer;flex-shrink:0;}

/* Stats fiche */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:12px 14px;}
.stat-cell{padding:11px 4px;text-align:center;border-right:1px solid var(--border2);}
.stat-cell:last-child{border-right:none;}
.stat-v{font-size:20px;font-weight:600;display:block;line-height:1;}
.stat-l{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:3px;display:block;}

/* Sections fiche */
.fs{margin:0 14px 10px;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.fs-hdr{background:#111;color:var(--or);padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;}
.fs-hdr-btn{background:rgba(201,146,26,.12);border:1px solid rgba(201,146,26,.25);color:var(--or);border-radius:5px;padding:2px 9px;font-size:9px;cursor:pointer;}
.fs-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border2);}
.fs-row:last-child{border-bottom:none;}
.fs-lbl{font-size:11px;color:var(--text2);}
.fs-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;max-width:60%;}
.fs-val.or{color:var(--or);}
.fs-val a{color:var(--vert);}

/* Équipe */
.eq-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border2);}
.eq-row:last-child{border-bottom:none;}
.eq-av{width:30px;height:30px;border-radius:50%;background:var(--or-light);border:1px solid var(--or-border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--or);flex-shrink:0;}
.eq-body{flex:1;min-width:0;}
.eq-nm{font-size:12px;font-weight:600;color:var(--text);}
.eq-ct{font-size:10px;color:var(--text3);margin-top:1px;}
.eq-tel{font-size:10px;color:var(--vert);white-space:nowrap;flex-shrink:0;}

/* Horaires */
.h-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:9px 12px;}
.h-cell{text-align:center;background:#F8F8F8;border:1px solid var(--border);border-radius:6px;padding:5px 2px;}
.h-cell.off{opacity:.35;}
.h-jl{font-size:7px;font-weight:700;color:var(--text2);text-transform:uppercase;}
.h-v{font-size:7px;color:var(--text);margin-top:2px;line-height:1.4;}

/* Performances */
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:9px 12px;}
.perf-c{background:#111;border-radius:8px;padding:10px;}
.perf-lbl{font-size:8px;color:#555;margin-bottom:4px;}
.perf-val{font-size:15px;font-weight:600;color:#fff;}
.perf-evo{font-size:9px;margin-top:3px;}

/* Formulaire visite */
.fsec{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.fsec-hdr{background:#111;color:var(--or);padding:9px 14px;font-size:10px;font-weight:700;border-bottom:1px solid var(--or);}
.ff{padding:11px 14px;border-bottom:1px solid var(--border2);}
.ff:last-child{border-bottom:none;}
.fl{font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px;display:block;}
.req{color:var(--rouge);margin-left:2px;}
input[type=text],input[type=date],input[type=number],input[type=tel],select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;
  font-size:12px;color:var(--text);background:#FAFAFA;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--or);background:#fff;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:.1s;}
.chip.on{background:#111;color:var(--or);border-color:#111;}
.chip.on-g{background:var(--vert-light);color:var(--vert);border-color:var(--vert-border);}
.chip.on-r{background:var(--rouge-light);color:var(--rouge);border-color:var(--rouge-border);}
.chip.on-o{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border);}

/* Boutons */
.btn-primary{display:block;width:100%;background:#111;color:var(--or);border:1px solid var(--or);border-radius:9px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;margin-top:10px;}
.btn-ghost{background:var(--card);color:var(--text2);border:1px solid var(--border);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-sm-r{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--orange-border);background:var(--orange-light);color:var(--orange);cursor:pointer;}
.btn-sm-g{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--vert-border);background:var(--vert-light);color:var(--vert);cursor:pointer;}
.btn-sm-n{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;}

/* Actions */
.ac-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:0 14px 9px;}
.ac-btns{display:flex;gap:5px;padding:0 14px 11px;}
.cfm{background:#FAFAFA;border-top:1px solid var(--border2);padding:11px 14px;}
.cfm-t{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;}
.cfm-s{font-size:10px;color:var(--text3);margin-bottom:9px;}
.cfm-row{display:flex;gap:7px;}
.cfm-ann{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:11px;color:var(--text2);cursor:pointer;}
.cfm-ok{flex:1;background:#111;border:none;border-radius:8px;padding:9px;font-size:11px;color:#fff;font-weight:600;cursor:pointer;}

/* Modales */
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;border-top:3px solid var(--or);}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;}
@media(min-width:769px){
  .modal-ov{align-items:center;}
  .modal{border-radius:16px;max-height:85vh;}
}

/* Loading */
.loading-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.7);z-index:400;align-items:center;justify-content:center;}
.loading-ov.open{display:flex;}
.loading-box{background:var(--card);border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;border:1px solid var(--border);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--or);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Divers */
.empty{text-align:center;color:var(--text3);padding:28px;font-size:12px;}
.succ{background:var(--vert-light);border-radius:9px;padding:12px;font-size:12px;color:var(--vert);font-weight:500;text-align:center;border:1px solid var(--vert-border);margin-top:10px;display:none;}
.alerte-banner{background:var(--rouge-light);border:1px solid var(--rouge-border);border-left:3px solid var(--rouge);border-radius:9px;padding:9px 13px;margin-bottom:10px;font-size:11px;font-weight:600;color:var(--rouge);display:flex;align-items:center;gap:7px;}
.param-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2);gap:10px;}
.param-row:last-child{border-bottom:none;}

/* Edit mode */
.edit-field{background:#FAFAFA;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;width:100%;transition:border-color .15s;}
.edit-field:focus{border-color:var(--or);background:#fff;outline:none;}
.edit-actions{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--border2);}
.edit-save{background:#111;color:var(--or);border:1px solid var(--or);border-radius:8px;padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;}

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
var SB_URL = 'https://btzwrdjgngfpsutegmci.supabase.co';
var SB_KEY = 'sb_publishable_0vlIW4o7tI847aAQ_8UYsg_FrC3w-Z4';

function sbFetch(path, opts) {
  var o = opts || {};
  o.headers = Object.assign({
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  }, o.headers || {});
  return fetch(SB_URL + '/rest/v1/' + path, o).then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
    var ct = r.headers.get('content-type') || '';
    if (ct.indexOf('json') > -1) return r.json();
    return r.text();
  });
}

// ============================================================
// DONNEES GLOBALES
// ============================================================
var MAGS=[], HISTO=[], ACTS=[], PERFS=[], USERS=[], PARAMS={}, TOUR=[];
var TODAY='', MOIS='';
var CU=null, PIN_BUF='', PIN_USR=null, C={}, MAD_ROW=null, MAD_ACT=null, CUR_F='tous', CUR_ACT_F='tous';

function fmtDate(d) {
  if (!d) return '';
  var dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('fr-FR');
}

function fmtEuro(v) {
  if (!v && v !== 0) return '--';
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(v);
}

function calcScore(jours, freq, nbAct, dernEtat) {
  var s = 0;
  if (jours > freq * 1.5) s += 2; else if (jours > freq) s += 1;
  if (nbAct >= 3) s += 2; else if (nbAct >= 1) s += 1;
  if (dernEtat === 'Mauvais') s += 2; else if (dernEtat === 'Moyen') s += 1;
  return Math.min(s, 4);
}

function buildTour() {
  var now = new Date();
  var tour = MAGS.filter(function(m){ return m.statut==='Actif'||m.statut==='Surveillance'; })
    .map(function(mg) {
      var dv=null, de='';
      for (var i=0;i<HISTO.length;i++) { if(HISTO[i].code===mg.code){dv=HISTO[i].dateRaw;de=HISTO[i].etat;break;} }
      var j = dv ? Math.floor((now-dv)/864e5) : 999;
      var acts = ACTS.filter(function(a){return a.code===mg.code;});
      var sc = calcScore(j, mg.freq_n||14, acts.length, de);
      return { code:mg.code, nom:mg.nom, ville:mg.ville, jours:j, score:sc, nbActs:acts.length, dernEtat:de, statut:mg.statut, hasAlerte:acts.some(function(a){return a.alerte;}) };
    });
  tour.sort(function(a,b){ return b.score!==a.score?b.score-a.score:b.jours-a.jours; });
  return tour;
}

// ============================================================
// CHARGEMENT INITIAL
// ============================================================
function loadData() {
  showL(true);
  var now = new Date();
  TODAY = now.toISOString().substring(0,10);
  MOIS = ('0'+(now.getMonth()+1)).slice(-2)+'/'+now.getFullYear();

  Promise.all([
    sbFetch('magasins?order=nom'),
    sbFetch('visites?order=date.desc&limit=500'),
    sbFetch('actions?statut=neq.Cloture&order=date.asc'),
    sbFetch('performances?order=mois.desc'),
    sbFetch('utilisateurs?actif=eq.true'),
    sbFetch('parametres')
  ]).then(function(res) {
    MAGS = res[0] || [];
    HISTO = (res[1]||[]).map(function(v){ v.dateRaw=new Date(v.date).getTime(); v.dateStr=fmtDate(v.date); return v; });
    var now2 = new Date();
    ACTS = (res[2]||[]).map(function(a){ a.age=Math.floor((now2-new Date(a.date))/864e5); a.desc=a.description||''; return a; });
    PERFS = res[3] || [];
    USERS = res[4] || [];
    PARAMS = {};
    (res[5]||[]).forEach(function(p){ PARAMS[p.cle]=p.valeur; });
    TOUR = buildTour();
    showL(false);
    try {
      var s = localStorage.getItem('crm_v1');
      if (s) { var u=JSON.parse(s); if(USERS.some(function(x){return x.nom===u.nom;})){CU=u;startApp();return;} }
    } catch(e) {}
    buildLogin();
  }).catch(function(err) {
    showL(false);
    document.getElementById('login').innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;">' +
      '<div style="background:#1A1A1A;border-radius:18px;padding:24px;border:1px solid #D94040;max-width:340px;width:100%;text-align:center;">' +
      '<div style="font-size:30px;margin-bottom:12px;">&#9888;</div>' +
      '<div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px;">Erreur de connexion</div>' +
      '<div style="font-size:11px;color:#D94040;">' + err.message + '</div>' +
      '<button onclick="location.reload()" style="margin-top:14px;background:#C9921A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12px;cursor:pointer;">Réessayer</button>' +
      '</div></div>';
  });
}

// ============================================================
// LOGIN
// ============================================================
function buildLogin() {
  var sub = document.getElementById('login-sub');
  if (sub && PARAMS.SECTEUR) sub.textContent = PARAMS.SECTEUR;
  var h = '';
  USERS.forEach(function(u) {
    var ini = u.nom.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
    h += '<button class="user-btn" data-idx="'+USERS.indexOf(u)+'" onclick="selectUserBtn(this)">' +
      '<div class="user-btn-av" style="background:'+u.couleur+';">'+ini+'</div>' +
      '<div><div class="user-btn-nm">'+u.nom+'</div><div class="user-btn-rl">'+u.role+' · '+u.secteur+'</div></div></button>';
  });
  if (!h) h = '<div style="color:#555;font-size:11px;text-align:center;padding:12px;">Ajoutez des utilisateurs dans Supabase.</div>';
  document.getElementById('step1').innerHTML = h;
}

function selectUserBtn(btn) {
  var u = USERS[parseInt(btn.getAttribute('data-idx'))]; if (!u) return;
  var ini = u.nom.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
  selectUser(u.nom, ini, u.couleur, u.role, u.secteur||'');
}

function selectUser(nom, ini, couleur, role, secteur) {
  PIN_USR={nom:nom,ini:ini,couleur:couleur,role:role,secteur:secteur}; PIN_BUF='';
  document.getElementById('pin-lbl').textContent=nom+' — code PIN';
  for(var i=0;i<4;i++){var p=g('pb'+i);p.textContent='';p.className='pin-box';}
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
  document.getElementById('pin-err').textContent='';
}

function pk(c) {
  if(PIN_BUF.length>=4)return; PIN_BUF+=c;
  var p=g('pb'+(PIN_BUF.length-1)); p.textContent='·'; p.classList.add('f');
  if(PIN_BUF.length===4) setTimeout(verifyPin,200);
}
function pdel() {
  if(!PIN_BUF.length)return; PIN_BUF=PIN_BUF.slice(0,-1);
  var p=g('pb'+PIN_BUF.length); p.textContent=''; p.className='pin-box';
}
function pcancel() {
  PIN_BUF=''; PIN_USR=null;
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='block';
}
function verifyPin() {
  var ok=USERS.some(function(u){return u.nom===PIN_USR.nom&&u.pin===PIN_BUF;});
  if(ok){ CU=PIN_USR; try{localStorage.setItem('crm_v1',JSON.stringify(CU));}catch(e){} startApp(); }
  else {
    for(var i=0;i<4;i++)g('pb'+i).className='pin-box err';
    g('pin-err').textContent='Code incorrect'; PIN_BUF='';
    setTimeout(function(){for(var i=0;i<4;i++){var p=g('pb'+i);p.textContent='';p.className='pin-box';}},1200);
  }
}

function startApp() {
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  var av=g('user-av'); if(av)av.style.background=CU.couleur;
  var ini=g('user-ini'); if(ini)ini.textContent=CU.ini;
  var nm=g('user-nm'); if(nm)nm.textContent=CU.nom.split(' ')[0];
  var nbAl=ACTS.filter(function(a){return a.alerte;}).length;
  if(nbAl>0){
    var bd=g('bell-dot'); if(bd)bd.classList.add('show');
    var ad=g('action-dot'); if(ad)ad.style.display='block';
    var sbb=g('sb-badge'); if(sbb){sbb.style.display='';sbb.textContent=nbAl;}
  }
  buildAccueil(); buildMagasins(); buildVisite(); buildActions(); buildParams();
  nav('accueil');
}

function deconnexion() {
  try{localStorage.removeItem('crm_v1');}catch(e){}
  CU=null; PIN_BUF=''; PIN_USR=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='block';
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='block';
}

var PAGES=['accueil','magasins','visite','actions','params','fiche'];

function nav(name) {
  PAGES.forEach(function(id){
    var el=g('pg-'+id); if(el){el.style.display='none';el.classList.remove('on');}
  });
  var pg=g('pg-'+name);
  if(pg){pg.style.display='block';pg.classList.add('on');}
  // Nav tabs desktop
  ['accueil','magasins','visite','actions','params'].forEach(function(t){
    var nt=g('nt-'+t); if(nt)nt.classList[t===name?'add':'remove']('on');
    var sb=g('sb-'+t); if(sb)sb.classList[t===name?'add':'remove']('on');
  });
  // Tabbar mobile
  ['accueil','magasins','actions','params'].forEach(function(t){

    if(si)si.style.stroke=active?'#C9921A':'#CCC';

function buildAccueil() {
  var prenom = CU ? CU.nom.split(' ')[0] : 'Moniteur';
  var nbAl = ACTS.filter(function(a){return a.alerte;}).length;
  var debut = new Date(); debut.setDate(1); debut.setHours(0,0,0,0);
  var nbVisMois = HISTO.filter(function(h){return h.dateRaw>=debut.getTime();}).length;
  var nbActifs = MAGS.filter(function(m){return m.statut==='Actif';}).length;
  var now = new Date();
  var nomJour = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'][now.getDay()];
  var nomMois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'][now.getMonth()];
  var h = '';

  // Header
  h += '<div style="margin-bottom:14px;">';
  h += '<div style="font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em;">Bonjour '+prenom+' 👋</div>';
  h += '<div style="font-size:11px;color:var(--text3);margin-top:2px;">'+nomJour+' '+now.getDate()+' '+nomMois+' · '+(PARAMS.SECTEUR||'Bassin de Thau')+'</div>';
  h += '</div>';

  // KPIs
  h += '<div class="kpi-row">';
  h += mkKpi(icoMag('#C9921A'),nbActifs,'Magasins','var(--or)');
  h += mkKpi(icoAl('#D07030'),ACTS.length,'Actions',ACTS.length>0?'var(--orange)':'var(--text)');
  h += mkKpi(icoCal('#777'),nbVisMois,'Visites mois','var(--text)');
  h += mkKpi(icoChk(nbAl>0?'#D94040':'#2E8050'),nbAl>0?nbAl:'OK',nbAl>0?'Alertes':'Conforme',nbAl>0?'var(--rouge)':'var(--vert)');
  h += '</div>';

  // Perf secteur
  var perfsMois = PERFS.filter(function(p){return p.mois===MOIS;});
  if (perfsMois.length > 0) {
    var totalCA26=0, totalCA25=0, totalDmq=0;
    perfsMois.forEach(function(p){totalCA26+=p.ca_2026||0;totalCA25+=p.ca_2025||0;totalDmq+=p.dmq_montant||0;});
    var evo = totalCA25>0?Math.round((totalCA26-totalCA25)/totalCA25*1000)/10:null;
    var dmqPct = totalCA26>0?Math.round(totalDmq/totalCA26*10000)/100:0;
    var dmqSeuil = parseFloat(PARAMS.DMQ_SEUIL)||2;
    var dmqAlerte = parseFloat(PARAMS.DMQ_ALERTE)||4;
    var dmqCol = dmqPct>dmqAlerte?'var(--rouge)':dmqPct>dmqSeuil?'var(--orange)':'var(--vert)';
    h += '<div class="card" style="margin-bottom:10px;">';
    h += '<div class="card-hdr"><span class="card-title">Performance secteur — '+MOIS+'</span></div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;">';
    h += '<div style="background:#111;border-radius:9px;padding:10px;"><div style="font-size:8px;color:#555;margin-bottom:3px;">CA cumulé</div>';
    h += '<div style="font-size:15px;font-weight:600;color:#fff;">'+fmtEuro(totalCA26)+'</div>';
    if(evo!==null)h+='<div style="font-size:9px;color:'+(evo>=0?'#2E8050':'#D94040')+';margin-top:2px;">'+(evo>=0?'▲':'▼')+' '+(evo>=0?'+':'')+evo+'% vs N-1</div>';
    h += '</div>';
    h += '<div style="background:#111;border-radius:9px;padding:10px;"><div style="font-size:8px;color:#555;margin-bottom:3px;">Démarque moy.</div>';
    h += '<div style="font-size:15px;font-weight:600;color:'+dmqCol+';">'+dmqPct.toFixed(1)+'%</div>';
    h += '<div style="font-size:9px;color:#555;margin-top:2px;">Seuil '+dmqSeuil+'% / alerte '+dmqAlerte+'%</div>';
    h += '</div></div></div>';
  }

  // Magasins à visiter
  h += '<div class="card">';
  h += '<div class="card-hdr"><span class="card-title">Magasins à visiter</span><span class="card-link" onclick="nav(\'magasins\')">Voir tout</span></div>';
  if (!TOUR.length) { h += '<div class="empty">Aucun magasin actif</div>'; }
  else {
    TOUR.slice(0,5).forEach(function(mr) {
      var sc=mr.score>=2?'URGENT':mr.score===1?'À RISQUE':'CONFORME';
      var pc=mr.score>=2?'pill-r':mr.score===1?'pill-o':'pill-g';
      var dot=mr.score>=2?'#D94040':mr.score===1?'#D07030':'#2E8050';
      var retardTxt = mr.jours===999?'Jamais visité':mr.jours+'j sans visite';
      var sub = retardTxt + (mr.hasAlerte?' · ⚠ alerte':'') + (mr.nbActs>0?' · '+mr.nbActs+' action'+(mr.nbActs>1?'s':''):'');
      h += '<div class="item-row" onclick="ouvrirFiche(\''+mr.code+'\')"><div class="item-dot" style="background:'+dot+';"></div>';
      h += '<div class="item-body"><div class="item-nom">'+mr.nom+'</div><div class="item-sub">'+sub+'</div></div>';
      h += '<span class="pill '+pc+'">'+sc+'</span><span class="item-chev">›</span></div>';
    });
  }
  h += '</div>';

  // Alertes
  var alertes = ACTS.filter(function(a){return a.alerte;});
  if (alertes.length > 0) {
    h += '<div class="card">';
    h += '<div class="card-hdr"><span class="card-title">Alertes prioritaires</span><button class="card-link" onclick="nav(\'actions\')">Voir tout</button></div>';
    alertes.slice(0,3).forEach(function(ac,idx) {
      var last=idx===Math.min(alertes.length,3)-1;
      h += '<div class="item-row" style="'+(last?'border-bottom:none':'')+'" onclick="ouvrirAction('+ac.id+')">';
      h += '<div style="width:32px;height:32px;border-radius:50%;background:var(--rouge-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+icoAl('#D94040')+'</div>';
      h += '<div class="item-body"><div class="item-nom">'+ac.mag+'</div><div class="item-sub">'+ac.desc+'</div></div>';
      h += '<span style="font-size:12px;font-weight:700;color:var(--rouge);">'+ac.age+'j</span></div>';
    });
    h += '</div>';
  }

  h += '<button class="btn-primary" onclick="genRapport()">📄 Rapport hebdo</button>';
  g('pg-accueil').innerHTML = h;
}

}

function setF(f,el) {

  filterMags();

function filterMags() {
  var v=(g('mag-search')||{value:''}).value.toLowerCase();
  var list=MAGS.filter(function(m){
    var t=!v||(m.nom.toLowerCase().indexOf(v)>-1||(m.code||'').toLowerCase().indexOf(v)>-1||(m.ville||'').toLowerCase().indexOf(v)>-1);
    var tr=TOUR.find(function(t2){return t2.code===m.code;});
    var sc=tr?tr.score:0;
    var f=CUR_F==='tous'?true:CUR_F==='risque'?sc>=1:sc===0;
    return t&&f;
  });
  var cnt=g('mag-count-txt'); if(cnt)cnt.textContent=list.length+' magasin(s)';

  // Desktop table
  var tbody=g('mag-desk-body');
  if(tbody){
    var dh='';
    list.forEach(function(mg){
      var tr=TOUR.find(function(t){return t.code===mg.code;});
      var sc=tr?tr.score:0,j=tr?tr.jours:999;
      var scn=Math.max(0,100-sc*20-(j>14?10:0));
      var scCol=sc>=2?'#D94040':sc>=1?'#D07030':'#2E8050';
      var lbl=sc>=2?'URGENT':sc>=1?'À RISQUE':'CONFORME';
      var jTxt=j===999?'Jamais':j+'j';
      var nbA=ACTS.filter(function(a){return a.code===mg.code;}).length;
      dh+='<tr>';
      dh+='<td><div style="font-size:12px;font-weight:600;color:var(--text);">'+mg.nom+'</div>';
      dh+='<div style="margin-top:2px;display:flex;gap:4px;"><span class="tf">'+mg.code+'</span><span style="font-size:10px;color:var(--text3);">'+mg.ville+'</span></div></td>';
      dh+='<td><span class="pill '+(sc>=2?'pill-r':sc>=1?'pill-o':'pill-g')+'">'+lbl+'</span></td>';
      dh+='<td><span style="font-size:12px;font-weight:600;color:'+scCol+';">'+scn+'</span><span class="score-bar"><div class="score-fill" style="width:'+scn+'%;background:'+scCol+';"></div></span></td>';
      dh+='<td style="font-size:11px;color:var(--text2);">'+jTxt+'</td>';
      dh+='<td><span style="font-size:11px;font-weight:500;color:'+(nbA>0?'var(--orange)':'var(--text3)')+';">'+nbA+'</span></td>';
      dh+='<td><div style="display:flex;gap:4px;">';
      dh+='<button onclick="ouvrirFiche(\''+mg.code+'\')" style="padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:10px;cursor:pointer;">Fiche</button>';
      dh+='<button onclick="preselectVisite(\''+mg.code+'\')" style="padding:3px 8px;border-radius:5px;border:1px solid var(--or-border);background:var(--or-light);color:var(--or);font-size:10px;cursor:pointer;font-weight:600;">Visiter</button>';
      dh+='</div></td></tr>';
    });
    tbody.innerHTML = dh || '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px;">Aucun magasin</td></tr>';
  }

  // Mobile list
  var ml=g('mag-list'); if(!ml)return;
  var mh='';
  list.forEach(function(mg){
    var tr=TOUR.find(function(t){return t.code===mg.code;});
    var sc=tr?tr.score:0,j=tr?tr.jours:999;
    var cls=sc>=2?'r':sc>=1?'o':'g';
    var pc=sc>=2?'pill-r':sc>=1?'pill-o':'pill-g';
    var lbl=sc>=2?'URGENT':sc>=1?'À RISQUE':'CONFORME';
    var scn=Math.max(0,100-sc*20-(j>14?10:0));
    var msc=sc>=2?'ms-r':sc>=1?'ms-o':'ms-g';
    mh+='<div class="mag-card '+cls+'" onclick="ouvrirFiche(\''+mg.code+'\')">';
    mh+='<div class="mag-info"><div class="mag-nm">'+mg.nom+'</div>';
    mh+='<div class="mag-meta"><span class="tf">'+mg.code+'</span><span style="font-size:10px;color:var(--text3);">'+mg.ville+'</span></div>';
    mh+='<div style="margin-top:5px;"><span class="pill '+pc+'">'+lbl+'</span></div></div>';
    mh+='<div class="mag-score '+msc+'"><span style="font-size:12px;font-weight:700;">'+scn+'</span><span style="font-size:7px;color:var(--text3);">/100</span></div>';
    mh+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>';
  });
  ml.innerHTML = mh || '<div class="empty">Aucun magasin</div>';
}

function saveMag() {
  var code=gv('me-code'),nom=gv('me-nom');
  if(!code||!nom){alert('Code et Nom requis');return;}
  var id=gv('mag-edit-id');
  var data={code:code,nom:nom,enseigne:gv('me-enseigne'),adresse:gv('me-adresse'),
    cp:gv('me-cp'),ville:gv('me-ville'),tel:gv('me-tel'),
    resp_civ:gv('me-civ'),resp_nom:gv('me-resp-nom'),resp_prenom:gv('me-resp-prenom'),
    notes:gv('me-notes'),freq_n:parseInt(gv('me-freqn'))||14,
    freq_s:parseInt(gv('me-freqs'))||7,statut:gv('me-statut')};
  showL(true);
  var req = id
    ? sbFetch('magasins?id=eq.'+id,{method:'PATCH',body:JSON.stringify(data)})
    : sbFetch('magasins',{method:'POST',body:JSON.stringify(data)});
  req.then(function(rows){
    var r=Array.isArray(rows)?rows[0]:rows;
    if(id){var idx=MAGS.findIndex(function(m){return m.id==id;});if(idx>-1)MAGS[idx]=r;}
    else MAGS.push(r);
    TOUR=buildTour(); showL(false); closeModal('mod-mag');
    buildMagasins(); buildAccueil();
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function ouvrirFiche(code) {
  var mg=MAGS.find(function(m){return m.code===code;}); if(!mg){showL(false);return;}
  var histo=HISTO.filter(function(h){return h.code===code;});
  var actions=ACTS.filter(function(a){return a.code===code;});
  var perfs=PERFS.filter(function(p){return p.code===code;});
  var now=new Date();
  var dv=histo.length>0?histo[0]:null;
  var jours=dv?Math.floor((now-dv.dateRaw)/864e5):999;
  var score=calcScore(jours,mg.freq_n||14,actions.length,dv?dv.etat:'');
  var slbl=score>=2?'URGENT':score===1?'À RISQUE':'CONFORME';
  var scol=score>=2?'#D94040':score===1?'#D07030':'#2E8050';
  var sbg=score>=2?'#FDF0F0':score===1?'#FEF5EC':'#F0F9F4';
  var pm=perfs.find(function(p){return p.mois===MOIS;})||null;
  var dmqSeuil=parseFloat(PARAMS.DMQ_SEUIL)||2;
  var dmqAlerte=parseFloat(PARAMS.DMQ_ALERTE)||4;
  var days=['L','M','M','J','V','S','D'];
  var hn=[mg.h_lun,mg.h_mar,mg.h_mer,mg.h_jeu,mg.h_ven,mg.h_sam,mg.h_dim];
  var waze='https://waze.com/ul?q='+encodeURIComponent((mg.adresse||'')+' '+(mg.cp||'')+' '+(mg.ville||''));
  var thisMo=histo.filter(function(h){var d=new Date(h.dateRaw);var dm=new Date();dm.setDate(1);dm.setHours(0,0,0,0);return d>=dm;}).length;

  var H='';
  // Header sticky
  H+='<div class="fiche-nav">';
  H+='<button class="fiche-back" onclick="fermerFiche()">←</button>';
  H+='<div class="fiche-info"><div class="fiche-nom">'+mg.nom+'</div>';
  H+='<div class="fiche-badges"><span class="fiche-code">'+mg.code+'</span>';
  H+='<span class="fiche-statut" style="background:'+sbg+';color:'+scol+';">'+slbl+'</span></div></div>';
  H+='<button class="fiche-edit-btn" onclick="ouvrirEditerMag(\''+mg.code+'\')">✏ Modifier</button>';
  H+='<button class="fiche-btn" onclick="preselectVisite(\''+mg.code+'\')">Visiter</button>';
  H+='</div>';

  // Stats
  H+='<div class="stats-row">';
  H+='<div class="stat-cell"><span class="stat-v">'+histo.length+'</span><span class="stat-l">Visites</span></div>';
  H+='<div class="stat-cell"><span class="stat-v" style="color:var(--vert);">'+thisMo+'</span><span class="stat-l">Ce mois</span></div>';
  H+='<div class="stat-cell"><span class="stat-v" style="color:'+(actions.length>0?'var(--orange)':'var(--text)')+';">'+actions.length+'</span><span class="stat-l">Actions</span></div>';
  H+='</div>';

  var wrap='<div style="padding:0 0 80px;">';
  // Contacts
  wrap+='<div class="fs"><div class="fs-hdr">Contacts</div>';
  if(mg.resp_nom)wrap+='<div class="fs-row"><span class="fs-lbl">Gérant</span><span class="fs-val">'+(mg.resp_civ||'')+' '+mg.resp_nom+' '+(mg.resp_prenom||'')+'</span></div>';
  if(mg.tel)wrap+='<div class="fs-row"><span class="fs-lbl">Téléphone</span><span class="fs-val"><a href="tel:'+mg.tel+'">'+mg.tel+'</a></span></div>';
  if(mg.adresse)wrap+='<div class="fs-row"><span class="fs-lbl">Adresse</span><span class="fs-val or"><a href="'+waze+'" style="color:var(--or);" target="_blank">'+mg.adresse+', '+mg.cp+' '+mg.ville+' ↗</a></span></div>';
  wrap+='</div>';

  // Équipe
  var equipeStr=mg.equipe_detail||mg.equipe||'';
  if(equipeStr){
    wrap+='<div class="fs"><div class="fs-hdr">Équipe</div>';
    var membres=equipeStr.split(';');
    membres.forEach(function(m){
      var s=m.trim(); if(!s)return;
      var parts=s.split(':');
      var nm=parts[0]?parts[0].trim():'';
      var det=parts[1]?parts[1].trim():'';
      var ini=nm.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
      wrap+='<div class="eq-row"><div class="eq-av">'+ini+'</div>';
      wrap+='<div class="eq-body"><div class="eq-nm">'+nm+'</div><div class="eq-ct">'+det+'</div></div></div>';
    });
    wrap+='</div>';
  }

  // Horaires
  wrap+='<div class="fs"><div class="fs-hdr">Horaires</div>';
  wrap+='<div class="h-grid">';
  for(var i=0;i<7;i++){
    var v=hn[i]||'';var f=!v||v.toLowerCase()==='ferme'||v.toLowerCase()==='fermé';
    wrap+='<div class="h-cell'+(f?' off':'')+'"><div class="h-jl">'+days[i]+'</div><div class="h-v">'+(f?'Fermé':v.replace('/','\n'))+'</div></div>';
  }
  if(mg.pause_dej)wrap+='<div style="padding:5px 12px;font-size:10px;color:var(--text3);">Coupure midi : '+mg.pause_dej+'</div>';
  wrap+='</div></div>';

  // Livraisons
  var livs=[
    {l:'Sec/Liq',j:mg.liv_sec_jour,c:mg.liv_sec_cmd},
    {l:'Frais',j:mg.liv_frais_jour,c:mg.liv_frais_cmd},
    {l:'F&L',j:mg.liv_fl_jour,c:mg.liv_fl_cmd},
    {l:'Surgelés',j:mg.liv_surge_jour,c:mg.liv_surge_cmd}
  ].filter(function(x){return x.j||x.c;});
  if(livs.length){
    wrap+='<div class="fs"><div class="fs-hdr">Livraisons &amp; commandes</div>';
    livs.forEach(function(x){
      wrap+='<div class="fs-row"><span class="fs-lbl">'+x.l+'</span>';
      wrap+='<span class="fs-val" style="font-size:11px;">'+(x.j?'Liv: '+x.j:'')+' '+(x.c?'· Cmd: '+x.c:'')+'</span></div>';
    });
    wrap+='</div>';
  }

  // Performance
  wrap+='<div class="fs"><div class="fs-hdr">Performance '+MOIS+' <button class="fs-hdr-btn" onclick="ouvrirSaisiePerf(\''+mg.code+'\')">+ Saisir</button></div>';
  if(pm){
    var ec=pm.ca_2025>0?(pm.ca_2026>=pm.ca_2025?'#2E8050':'#D94040'):'#AAA';
    var evo2=pm.ca_2025>0?Math.round((pm.ca_2026-pm.ca_2025)/pm.ca_2025*1000)/10:null;
    var dmqPct=pm.ca_2026>0?Math.round((pm.dmq_montant||0)/pm.ca_2026*10000)/100:0;
    var dc=dmqPct>dmqAlerte?'#D94040':dmqPct>dmqSeuil?'#D07030':'#2E8050';
    wrap+='<div class="perf-grid">';
    wrap+='<div class="perf-c"><div class="perf-lbl">CA mensuel</div><div class="perf-val">'+fmtEuro(pm.ca_2026||0)+'</div>';
    if(evo2!==null)wrap+='<div class="perf-evo" style="color:'+ec+';">'+(evo2>=0?'▲':'▼')+' '+(evo2>=0?'+':'')+evo2+'% vs N-1</div>';
    wrap+='</div>';
    wrap+='<div class="perf-c"><div class="perf-lbl">Démarque</div><div class="perf-val" style="color:'+dc+';">'+dmqPct.toFixed(2)+'%</div>';
    wrap+='<div class="perf-evo" style="color:#555;">Seuil alerte '+dmqAlerte+'%</div></div></div>';
  } else {
    wrap+='<div class="empty">Aucune donnée pour '+MOIS+'</div>';
  }
  wrap+='</div>';

  // Actions
  if(actions.length>0){
    wrap+='<div class="fs"><div class="fs-hdr">Actions ouvertes</div>';
    actions.forEach(function(ac){
      var ac_col=ac.age>20?'#D94040':ac.age>8?'#D07030':'#2E8050';
      wrap+='<div style="padding:9px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;gap:9px;">';
      wrap+='<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;color:var(--text);">'+ac.desc+'</div>';
      if(ac.alerte)wrap+='<div style="font-size:10px;color:var(--rouge);font-weight:600;margin-top:2px;">⚠ '+ac.alerte+'</div>';
      wrap+='<div style="font-size:10px;color:var(--text3);margin-top:2px;">'+fmtDate(ac.date)+'</div></div>';
      wrap+='<span style="font-size:11px;font-weight:700;color:'+ac_col+';white-space:nowrap;">J+'+ac.age+'</span></div>';
    });
    wrap+='</div>';
  }

  // Historique visites
  if(histo.length>0){
    wrap+='<div class="fs"><div class="fs-hdr">Dernières visites</div>';
    histo.slice(0,5).forEach(function(v,idx){
      var last=idx===Math.min(histo.length,5)-1;
      var ec=(v.etat==='Bon'||v.etat==='Tres bon'||v.etat==='Très bon')?'#2E8050':v.etat==='Mauvais'?'#D94040':'#D07030';
      var ebg=(v.etat==='Bon'||v.etat==='Tres bon'||v.etat==='Très bon')?'var(--vert-light)':v.etat==='Mauvais'?'var(--rouge-light)':'var(--orange-light)';
      var typeIco=v.type_visite==='contact'||v.type_visite==='Tel'?'📞':'📍';
      wrap+='<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;'+(last?'':'border-bottom:1px solid var(--border2);')+'">';
      wrap+='<div style="font-size:10px;font-weight:600;color:var(--text);width:40px;flex-shrink:0;">'+(v.dateStr||'').substring(0,5)+'</div>';
      wrap+='<div style="flex:1;min-width:0;"><div style="font-size:11px;font-weight:600;color:var(--text);">'+typeIco+' '+(v.motif||'')+'</div>';
      wrap+='<div style="font-size:10px;color:var(--text3);">'+(v.moniteur||'')+(v.cr?' · '+v.cr.substring(0,40)+'...':'')+'</div></div>';
      if(v.etat)wrap+='<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+ebg+';color:'+ec+';white-space:nowrap;">'+v.etat+'</span>';
      wrap+='</div>';
    });
    wrap+='</div>';
  }

  wrap+='</div>';
  H+=wrap;
  g('pg-fiche').innerHTML=H;
  nav('fiche');
}

function buildVisite() {
  var opts='<option value="">-- Choisir un magasin --</option>';
  MAGS.forEach(function(m){if(m.statut==='Actif'||m.statut==='Surveillance')opts+='<option value="'+m.code+'" data-nom="'+(m.nom||'')+'">'+m.code+' — '+m.nom+'</option>';});

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
    '<div class="ff"><label class="fl">Date <span class="req">*</span></label><input type="date" id="f-date" value="'+TODAY+'"></div>'+
    '<div class="ff"><label class="fl">Type de visite</label><div class="chips" id="chips-type">'+

    '<span class="chip" onclick="csel(this,\'type\')">📞 Téléphone</span></div></div></div>'+
    '<div class="ff"><label class="fl">Gérant présent</label><input type="text" id="f-gerant" placeholder="Nom du gérant"></div>');
  h+=mkChips('État général','etat',['Très bon','Bon','Moyen','Mauvais'],true);
  h+=mkFSec('Audit conformité',
    '<div class="ff"><label class="fl">Linéaire / facing</label><div class="chips" id="chips-lineaire"><span class="chip" onclick="csel(this,\'lineaire\')">OK</span><span class="chip" onclick="csel(this,\'lineaire\')">Non</span><span class="chip" onclick="csel(this,\'lineaire\')">Partiel</span></div></div>'+
    '<div class="ff"><label class="fl">Procédures hygiène / HACCP</label><div class="chips" id="chips-procedures"><span class="chip" onclick="csel(this,\'procedures\')">OK</span><span class="chip" onclick="csel(this,\'procedures\')">Non</span><span class="chip" onclick="csel(this,\'procedures\')">Partiel</span></div></div>'+
    '<div class="ff"><label class="fl">Ruptures</label><div class="chips" id="chips-ruptures"><span class="chip" onclick="csel(this,\'ruptures\')">Aucune</span><span class="chip" onclick="csel(this,\'ruptures\')">1–3 réf.</span><span class="chip" onclick="csel(this,\'ruptures\')">4–10 réf.</span><span class="chip" onclick="csel(this,\'ruptures\')">+10 réf.</span></div></div>'+
    '<div class="ff"><label class="fl">DLC / chaîne du froid</label><div class="chips" id="chips-dlc"><span class="chip" onclick="csel(this,\'dlc\')">OK</span><span class="chip" onclick="csel(this,\'dlc\')">Quelques produits</span><span class="chip" onclick="csel(this,\'dlc\')">Grave</span></div></div>'+
    '<div class="ff"><label class="fl">Merchandising / mise en avant promo</label><div class="chips" id="chips-merch"><span class="chip" onclick="csel(this,\'merch\')">OK</span><span class="chip" onclick="csel(this,\'merch\')">Partiel</span><span class="chip" onclick="csel(this,\'merch\')">Non</span></div></div>'+
    '<div class="ff"><label class="fl">Autonomie gérant</label><div class="chips" id="chips-autonomie"><span class="chip" onclick="csel(this,\'autonomie\')">Bon</span><span class="chip" onclick="csel(this,\'autonomie\')">Moyen</span><span class="chip" onclick="csel(this,\'autonomie\')">À accompagner</span></div></div>');
  h+=mkFSec('Compte rendu &amp; commentaire',
    '<div class="ff"><label class="fl">Compte rendu de visite</label><textarea id="f-cr" rows="3" placeholder="Résumé de la visite, points clés..."></textarea></div>'+
    '<div class="ff"><label class="fl">Commentaire interne</label><textarea id="f-comment" rows="2" placeholder="Notes privées, infos pour le prochain passage..."></textarea></div>');
  h+='<div class="fsec"><div class="fsec-hdr">Action nécessaire</div>'+
    '<div class="ff"><div class="chips"><span class="chip on-r" onclick="togAct(this,true)">Oui</span><span class="chip" onclick="togAct(this,false)">Non</span></div></div>'+
    '<div id="act-det">'+
    '<div class="ff"><label class="fl">Description de l\'action <span class="req">*</span></label><textarea id="f-act" rows="2" placeholder="Que faut-il faire ?"></textarea></div>'+
    '<div class="ff"><label class="fl">Responsable</label><div class="chips" id="chips-rb">'+
    '<span class="chip" onclick="setRB(this,\'rb-moi\')">Moi</span>'+

    '<span class="chip" onclick="setRB(this,\'rb-mag\')">Gérant</span></div></div>'+

function mkFSec(titre,body){return '<div class="fsec"><div class="fsec-hdr">'+titre+'</div>'+body+'</div>';}
function mkChips(lbl,group,opts,req){
  var h='<div class="fsec"><div class="fsec-hdr">'+lbl+(req?' <span style="color:var(--rouge);">*</span>':'')+'</div><div class="ff"><div class="chips" id="chips-'+group+'">';
  opts.forEach(function(o){h+='<span class="chip" onclick="csel(this,\''+group+'\')">'+o+'</span>';});
  return h+'</div></div></div>';
}
function csel(el,gr){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C[gr]=el.textContent.trim();}
function setRB(el,v){g('chips-rb').querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C.rb=v;}
function togAct(el,show){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add(show?'on-r':'on');C.action=show?'Oui':'Non';g('act-det').style.display=show?'block':'none';}
function togAl(el,show){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add(show?'on-r':'on');C.alerte=show?'Oui':'Non';g('al-det').style.display=show?'block':'none';}
function onMagCh(){var s=g('f-mag');var o=s.options[s.selectedIndex];var n=g('f-mag-nom');if(n)n.value=o?o.getAttribute('data-nom'):'';}

function soumettreVisite() {
  var ms=g('f-mag'); if(!ms||!ms.value){alert('Choisissez un magasin');return;}
  if(!C.etat){alert("Indiquez l'état général");return;}
  showL(true);
  var now=new Date();
  var typeVisite=(C.type||'terrain').indexOf('éléphone')>-1||C.type==='contact'?'contact':'terrain';
  var visiteData={
    date:now.toISOString(),code:ms.value,nom:gv('f-mag-nom'),
    motif:typeVisite==='contact'?'Contact téléphonique':'Visite terrain',
    etat:C.etat||'',lineaire:C.lineaire||'',procedures:C.procedures||'',
    ruptures:C.ruptures||'',dlc:C.dlc||'',gerant:gv('f-gerant'),
    autonomie:C.autonomie||'',cr:gv('f-cr'),
    moniteur:CU?CU.nom:'',type_visite:typeVisite,
    alerte:C.alerte==='Oui'?gv('f-alerte'):''
  };
  var p=Promise.resolve();
  var actId='';
  if(C.action==='Oui'&&gv('f-act')){
    actId='ACT'+now.getTime();
    var actionData={action_id:actId,date:now.toISOString(),code:ms.value,mag:gv('f-mag-nom'),
      description:gv('f-act'),statut:'Ouvert',resp_badge:C.rb||'',
      alerte:C.alerte==='Oui'?gv('f-alerte'):''};
    p=sbFetch('actions',{method:'POST',body:JSON.stringify(actionData)}).then(function(rows){
      var nr=Array.isArray(rows)?rows[0]:rows;
      nr.age=0; nr.desc=nr.description||''; nr.mag=nr.mag||'';
      ACTS.push(nr);
    });
  }
  visiteData.action_id=actId;
  p.then(function(){return sbFetch('visites',{method:'POST',body:JSON.stringify(visiteData)});})
  .then(function(rows){
    var nv=Array.isArray(rows)?rows[0]:rows;
    nv.dateRaw=new Date(nv.date).getTime(); nv.dateStr=fmtDate(nv.date);
    HISTO.unshift(nv); TOUR=buildTour();
    showL(false);
    var msg=g('v-msg'); msg.style.display='block';
    C={}; C.action='Oui'; C.type='terrain';
    setTimeout(function(){msg.style.display='none';buildVisite();buildAccueil();nav('accueil');},2000);
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function buildActions(){renderActions();}

function renderActions() {
  var h='';
  var als=ACTS.filter(function(a){return a.alerte;});
  if(als.length>0){
    h+='<div class="alerte-banner">⚠ '+als.length+' alerte'+(als.length>1?'s':'')+' active'+(als.length>1?'s':'')+'</div>';
  }

  h+='<div class="frow">';
  h+='<span class="fp '+(CUR_ACT_F==='tous'?'on':'off')+'" onclick="setActF(\'tous\',this)">Toutes</span>';
  h+='<span class="fp '+(CUR_ACT_F==='rb-moi'?'on':'off')+'" onclick="setActF(\'rb-moi\',this)">Moi</span>';
  h+='<span class="fp '+(CUR_ACT_F==='rb-siege'?'on':'off')+'" onclick="setActF(\'rb-siege\',this)">Siège</span>';
  h+='<span class="fp '+(CUR_ACT_F==='rb-mag'?'on':'off')+'" onclick="setActF(\'rb-mag\',this)">Gérant</span>';

  if(!filtered.length){h+='<div class="empty">Aucune action'+(CUR_ACT_F!=='tous'?' pour ce filtre':'')+'</div>';g('pg-actions').innerHTML=h;return;}

  filtered.forEach(function(ac){
    var bc=ac.age>20?'cl-r':ac.age>8?'cl-o':'cl-g';
    var pc=ac.age>20?'pill-r':ac.age>8?'pill-o':'pill-g';
    var rbMap={'rb-moi':'Moi','rb-siege':'Siège','rb-coll':'Collègue','rb-mag':'Gérant'};
    var rbCls={'rb-moi':'pill-g','rb-siege':'pill-v','rb-coll':'pill-or','rb-mag':'pill-n'};
    var rbH=ac.resp_badge&&rbMap[ac.resp_badge]?'<span class="pill '+rbCls[ac.resp_badge]+'">'+rbMap[ac.resp_badge]+'</span>':'';
    h+='<div class="card card-l '+bc+'" onclick="ouvrirAction('+ac.id+')">';
    h+='<div style="padding:11px 14px 6px;"><div style="font-size:13px;font-weight:700;color:var(--text);">'+(ac.alerte?'⚠ ':'')+ac.desc+'</div></div>';
    h+='<div class="ac-meta"><span class="tf">'+ac.code+'</span><span style="font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+ac.mag+'</span>'+rbH+'<span class="pill '+pc+'" style="margin-left:auto;">J+'+ac.age+'</span></div>';
    if(ac.alerte)h+='<div style="background:var(--rouge-light);border-top:1px solid var(--border2);padding:6px 14px;font-size:9px;color:var(--rouge);font-weight:600;">'+ac.alerte+'</div>';
    h+='<div class="ac-btns" onclick="event.stopPropagation();">';
    h+='<button class="btn-sm-n" onclick="ouvrirNote('+ac.id+')">+ Note</button>';
    h+='<button class="btn-sm-r" onclick="askRelRow('+ac.id+')">Relancer</button>';
    h+='<button class="btn-sm-g" onclick="askCloRow('+ac.id+')">Clôturer</button></div></div>';
  });
  g('pg-actions').innerHTML=h;
}

function setActF(f,el){
  CUR_ACT_F=f;
  document.querySelectorAll('#pg-actions .fp').forEach(function(p){p.className='fp off';});
  if(el)el.className='fp on';
  renderActions();
}

function ouvrirAction(id) {
  var ac=ACTS.find(function(a){return a.id==id;}); if(!ac)return;
  MAD_ROW=id; MAD_ACT=null;
  g('mad-title').textContent=ac.mag+' — '+ac.code;
  var rbMap={'rb-moi':'Moi','rb-siege':'Siège','rb-coll':'Collègue','rb-mag':'Gérant'};
  var rbCls={'rb-moi':'pill-g','rb-siege':'pill-v','rb-coll':'pill-or','rb-mag':'pill-n'};
  var h='<div style="background:#F8F8F8;border-radius:9px;padding:12px;margin-bottom:12px;">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">'+(ac.alerte?'⚠ ':'')+ac.desc+'</div>';
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">';
  h+='<span class="pill '+(ac.age>20?'pill-r':ac.age>8?'pill-o':'pill-g')+'">J+'+ac.age+'</span>';
  if(ac.resp_badge&&rbMap[ac.resp_badge])h+='<span class="pill '+rbCls[ac.resp_badge]+'">'+rbMap[ac.resp_badge]+'</span>';
  h+='<span class="pill pill-n">'+ac.statut+'</span>';
  if(ac.echeance)h+='<span class="pill pill-n">Éch: '+fmtDate(ac.echeance)+'</span>';
  h+='</div>';
  if(ac.alerte)h+='<div style="background:var(--rouge-light);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--rouge);font-weight:600;margin-bottom:6px;">⚠ '+ac.alerte+'</div>';
  h+='<div style="font-size:10px;color:var(--text3);">Relances: '+(ac.nb_relances||0)+' · Ouvert le '+fmtDate(ac.date)+'</div></div>';
  h+='<div class="ff"><label class="fl">Note <span style="font-size:10px;font-weight:400;color:var(--text3);">optionnel</span></label>';
  h+='<textarea id="mad-note" rows="2" placeholder="Suivi..."></textarea></div>';
  if(ac.notes_suivi){
    h+='<div style="background:#F8F8F8;border-radius:8px;padding:10px;margin-top:8px;"><div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:5px;">Historique notes</div>';
    h+='<div style="font-size:11px;color:var(--text2);white-space:pre-line;">'+ac.notes_suivi+'</div></div>';
  }
  g('mad-body').innerHTML=h;
  g('mad-cfm').style.display='none'; g('mad-main-btns').style.display='flex'; g('mad-msg').style.display='none';
  openModal('mod-action');
}

function ouvrirNote(id){MAD_ROW=id;g('note-id').value=id;g('note-txt').value='';openModal('mod-note');}
function askCloRow(id){MAD_ROW=id;ouvrirAction(id);setTimeout(askClo,100);}
function askRelRow(id){MAD_ROW=id;ouvrirAction(id);setTimeout(askRel,100);}
function askClo(){MAD_ACT='cloturer';g('mad-cfm-t').textContent="Confirmer la clôture ?";g('mad-cfm-s').textContent="L'action sera archivée.";g('mad-main-btns').style.display='none';g('mad-cfm').style.display='block';}
function askRel(){MAD_ACT='relancer';g('mad-cfm-t').textContent='Confirmer la relance ?';g('mad-cfm-s').textContent='Le statut passera à Relancé.';g('mad-main-btns').style.display='none';g('mad-cfm').style.display='block';}
function annulCfm(){g('mad-cfm').style.display='none';g('mad-main-btns').style.display='flex';MAD_ACT=null;}

function doCfm() {
  if(!MAD_ROW||!MAD_ACT)return;
  var note=gv('mad-note');
  showL(true);
  var p;
  if(MAD_ACT==='cloturer'){
    p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Cloture'})});
  } else {
    var ac=ACTS.find(function(a){return a.id==MAD_ROW;});
    var suivi=(ac&&ac.notes_suivi?ac.notes_suivi+'\n':'')+new Date().toLocaleDateString('fr-FR')+(note?' — '+note:'');
    p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Relance',nb_relances:(ac?(ac.nb_relances||0)+1:1),notes_suivi:suivi})});
  }
  p.then(function(){
    showL(false); closeModal('mod-action');
    if(MAD_ACT==='cloturer') ACTS=ACTS.filter(function(a){return a.id!=MAD_ROW;});
    else ACTS=ACTS.map(function(a){if(a.id==MAD_ROW){a.statut='Relance';a.nb_relances=(a.nb_relances||0)+1;}return a;});
    buildAccueil(); renderActions(); MAD_ROW=null; MAD_ACT=null;
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function saveNote() {
  var note=gv('note-txt'); if(!note)return;
  var ac=ACTS.find(function(a){return a.id==MAD_ROW;});
  var suivi=(ac&&ac.notes_suivi?ac.notes_suivi+'\n':'')+new Date().toLocaleDateString('fr-FR')+' — '+note;
  showL(true);
  sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({notes_suivi:suivi})})
    .then(function(){if(ac)ac.notes_suivi=suivi;showL(false);closeModal('mod-note');})
    .catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

// ============================================================
// PERFORMANCES
// ============================================================
function savePerf() {
  var code=gv('perf-code');
  var data={code:code,mois:gv('perf-mois'),ca_2026:parseFloat(gv('perf-ca26'))||0,
    ca_2025:parseFloat(gv('perf-ca25'))||0,nb_cli_2026:parseFloat(gv('perf-nb26'))||0,
    nb_cli_2025:parseFloat(gv('perf-nb25'))||0,ca_fl:parseFloat(gv('perf-fl'))||0,
    dmq_montant:parseFloat(gv('perf-dmq'))||0,notes:gv('perf-notes')};
  showL(true);
  sbFetch('performances',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(data)})
    .then(function(rows){
      var r=Array.isArray(rows)?rows[0]:rows;
      var idx=PERFS.findIndex(function(p){return p.code===code&&p.mois===data.mois;});
      if(idx>-1)PERFS[idx]=r; else PERFS.push(r);
      showL(false); closeModal('mod-perf'); ouvrirFiche(code);
    }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

// ============================================================

    h+='<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:var(--text);">'+u.nom+'</div><div style="font-size:11px;color:var(--text3);">'+u.role+'</div></div>';
    h+='<span style="font-size:11px;font-weight:600;color:var(--text3);">••••</span></div>';

  h+='<div class="card"><div class="card-hdr"><span class="card-title">Informations</span></div>';

  h+='<div class="fs-row"><span class="fs-lbl">Secteur</span><span style="font-size:12px;font-weight:600;color:var(--text);">'+(PARAMS.SECTEUR||'Bassin de Thau')+'</span></div>';
  h+='<div class="fs-row"><span class="fs-lbl">Hébergement</span><span style="font-size:12px;font-weight:600;color:var(--text);">Vercel + Supabase</span></div>';

  h+='<button class="btn-ghost" style="width:100%;margin-top:8px;color:var(--rouge);border-color:var(--rouge-border);" onclick="deconnexion()">Se déconnecter</button>';
  g('pg-params').innerHTML=h;
}

// ============================================================
// RAPPORT
// ============================================================
function genRapport() {
  var now=new Date();
  var sem=Math.ceil((now-new Date(now.getFullYear(),0,1))/(7*864e5));
  var debut=new Date(); debut.setDate(1); debut.setHours(0,0,0,0);
  var vm=HISTO.filter(function(h){return h.dateRaw>=debut.getTime();});
  var lines=['RAPPORT HEBDOMADAIRE — Semaine '+sem,
    'Moniteur : '+(CU?CU.nom:''),'Secteur : '+(PARAMS.SECTEUR||'Bassin de Thau'),
    '='.repeat(32),'','INDICATEURS','Visites ce mois : '+vm.length,'Actions ouvertes : '+ACTS.length,''];
  lines.push('MAGASINS À VISITER EN PRIORITÉ');
  TOUR.filter(function(t){return t.score>=1;}).slice(0,8).forEach(function(t){
    lines.push((t.score>=2?'URGENT ':'SUIVI  ')+t.nom+' ('+t.code+') — '+t.jours+'j sans visite'+(t.hasAlerte?' ⚠':''));
  });
  lines.push('','ACTIONS EN COURS ('+ACTS.length+')');
  ACTS.slice(0,10).forEach(function(a){lines.push((a.age>20?'URGENT ':a.age>8?'SUIVI  ':'OK     ')+a.mag+' J+'+a.age+' — '+a.desc);});
  var alertes=ACTS.filter(function(a){return a.alerte;});
  if(alertes.length){lines.push('','ALERTES ACTIVES');alertes.forEach(function(a){lines.push('⚠ '+a.mag+' — '+a.alerte);});}
  lines.push('','Généré le '+now.toLocaleDateString('fr-FR')+' à '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  var txt=lines.join('\n');
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:500;padding:16px;overflow-y:auto;';
  var btnF=document.createElement('button'); btnF.textContent='Fermer'; btnF.className='btn-ghost';
  btnF.style.marginBottom='10px'; btnF.onclick=function(){document.body.removeChild(wrap);};
  var ta=document.createElement('textarea'); ta.value=txt;
  ta.style.cssText='width:100%;height:65vh;font-size:12px;line-height:1.7;border:1px solid var(--border);border-radius:9px;padding:12px;font-family:monospace;';
  var btnC=document.createElement('button'); btnC.textContent='Copier'; btnC.className='btn-primary';
  btnC.style.marginTop='10px'; btnC.onclick=function(){ta.select();document.execCommand('copy');btnC.textContent='✓ Copié !';};
  wrap.appendChild(btnF); wrap.appendChild(ta); wrap.appendChild(btnC); document.body.appendChild(wrap);
}

// ============================================================
// UTILS
// ============================================================
function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value:'';}
function showL(s){var el=g('lov');if(el)el.classList[s?'add':'remove']('open');}
function openModal(id){var el=g(id);if(el)el.classList.add('open');}
function closeModal(id){var el=g(id);if(el)el.classList.remove('open');}

// Fermer modale en cliquant sur overlay
document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-ov'))e.target.classList.remove('open');
});

document.addEventListener('DOMContentLoaded', loadData);
