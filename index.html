<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CRM Moniteur des Ventes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F5;padding-bottom:74px;}
button,select,input,textarea{font-family:inherit;}
a{text-decoration:none;}
svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
.nav{background:#fff;padding:0 14px;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;border-bottom:1px solid #EBEBEB;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nav-logo{display:flex;align-items:center;gap:6px;padding:9px 0;margin-right:8px;}
.logo-ring{width:28px;height:28px;border-radius:50%;border:2px solid #C9921A;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-m{font-size:12px;font-weight:700;color:#C9921A;line-height:1;}
.ntab{color:#BBB;padding:0 10px;font-size:11px;font-weight:500;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;height:44px;white-space:nowrap;transition:color .15s;}
.ntab.on{color:#111;border-bottom-color:#C9921A;font-weight:600;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.bell{position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.bell-dot{width:8px;height:8px;border-radius:50%;background:#D94040;position:absolute;top:2px;right:2px;border:2px solid #fff;display:none;}
.bell-dot.show{display:block;}
.user-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #E8D080;flex-shrink:0;}
.user-ini{font-size:10px;font-weight:700;color:#fff;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-around;padding:6px 0 16px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.05);}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:54px;}
.tlbl{font-size:9px;font-weight:500;color:#CCC;}
.tlbl.on{color:#C9921A;}
.plus-btn{width:50px;height:50px;border-radius:50%;background:#C9921A;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(201,146,26,.4);margin-top:-22px;}
.plus-lbl{font-size:9px;color:#C9921A;font-weight:500;margin-top:3px;}
.action-dot{display:none;width:7px;height:7px;border-radius:50%;background:#D94040;position:absolute;top:0;right:8px;border:2px solid #fff;}
.action-dot.show{display:block;}
.pg{display:none;padding:14px;}
.pg.on{display:block;}
.pg-fiche{display:none;padding:0;}
.pg-fiche.on{display:block;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;}
.login-card{background:#1A1A1A;border-radius:16px;padding:24px 20px;width:100%;max-width:340px;border:1px solid #2A2A2A;}
.login-title{font-size:18px;font-weight:600;color:#fff;text-align:center;margin-bottom:2px;}
.login-sub{font-size:11px;color:#555;text-align:center;margin-bottom:20px;}
.user-btn{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:8px;border:1px solid #2A2A2A;background:#111;cursor:pointer;margin-bottom:7px;width:100%;text-align:left;transition:border-color .15s;}
.user-btn:hover,.user-btn.sel{border-color:#C9921A;}
.user-btn-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.user-btn-nm{font-size:12px;font-weight:500;color:#DDD;}
.user-btn-rl{font-size:10px;color:#555;}
.pin-title{font-size:10px;color:#555;text-align:center;margin:14px 0 10px;}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.pin-box{width:46px;height:54px;background:#111;border:1px solid #2A2A2A;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;transition:.1s;}
.pin-box.f{border-color:#C9921A;color:#C9921A;}
.pin-box.err{border-color:#D94040;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.pin-key{background:#111;border:1px solid #2A2A2A;border-radius:8px;padding:13px;font-size:18px;color:#fff;cursor:pointer;text-align:center;transition:.1s;}
.pin-key:active{background:#222;transform:scale(.95);}
.pin-err{color:#D94040;font-size:11px;text-align:center;margin-top:8px;min-height:16px;}
.krow{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border:1px solid #EBEBEB;border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.kpi{padding:12px 4px;text-align:center;border-right:1px solid #F0F0F0;}
.kpi:last-child{border-right:none;}
.kpi-ico{height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;}
.kv{font-size:21px;font-weight:500;letter-spacing:-1px;line-height:1;}
.kl{font-size:8px;color:#CCC;margin-top:3px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sec-title{font-size:14px;font-weight:700;color:#111;}
.sec-link{font-size:11px;color:#C9921A;font-weight:600;cursor:pointer;border:none;background:none;padding:0;}
.card{background:#fff;border:1px solid #EBEBEB;border-radius:10px;margin-bottom:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-l{border-left:3px solid;}
.cl-r{border-left-color:#D94040;}
.cl-o{border-left-color:#D07030;}
.cl-g{border-left-color:#2E8050;}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.02em;}
.pill-r{background:#FDF0F0;color:#D94040;}
.pill-o{background:#FEF5EC;color:#D07030;}
.pill-g{background:#F0F9F4;color:#2E8050;}
.pill-or{background:#FDF7E8;color:#C9921A;}
.pill-n{background:#F5F5F5;color:#888;}
.pill-v{background:#F5F3FF;color:#5B21B6;}
.tf{background:#111;color:#C9921A;padding:2px 7px;border-radius:20px;font-size:8px;font-weight:700;}
.tour-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #F7F7F7;cursor:pointer;}
.tour-item:last-child{border-bottom:none;}
.tour-time{font-size:10px;color:#CCC;width:36px;flex-shrink:0;}
.tour-dot-wrap{display:flex;flex-direction:column;align-items:center;margin-right:10px;flex-shrink:0;}
.tour-dot{width:8px;height:8px;border-radius:50%;}
.tour-line{width:1px;height:18px;background:#F0F0F0;margin-top:2px;}
.tour-body{flex:1;min-width:0;}
.tour-nm{font-size:12px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tour-sub{font-size:10px;color:#AAA;margin-top:1px;}
.chev{color:#DDD;font-size:16px;margin-left:4px;flex-shrink:0;}
.al-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #F7F7F7;cursor:pointer;}
.al-item:last-child{border-bottom:none;}
.al-ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.al-body{flex:1;min-width:0;}
.al-nm{font-size:12px;font-weight:600;color:#111;}
.al-sub{font-size:10px;color:#AAA;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mag-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #EBEBEB;border-left:3px solid;border-radius:10px;padding:13px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.mag-card.r{border-left-color:#D94040;}
.mag-card.o{border-left-color:#D07030;}
.mag-card.g{border-left-color:#2E8050;}
.mag-info{flex:1;min-width:0;}
.mag-nm{font-size:13px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mag-meta{display:flex;align-items:center;gap:5px;margin-top:3px;}
.mag-score{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2.5px solid;flex-shrink:0;flex-direction:column;}
.ms-r{color:#D94040;border-color:#F0C0C0;}
.ms-o{color:#D07030;border-color:#ECC890;}
.ms-g{color:#2E8050;border-color:#98D0B0;}
.frow{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.frow::-webkit-scrollbar{display:none;}
.fp{padding:6px 14px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;border:1px solid;cursor:pointer;transition:.15s;}
.fp.on{background:#111;color:#C9921A;border-color:#111;}
.fp.off{background:#fff;color:#AAA;border-color:#E8E8E8;}
.srch{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E8E8E8;border-radius:10px;padding:9px 13px;margin-bottom:12px;}
.srch input{border:none;outline:none;font-size:11px;color:#111;flex:1;background:transparent;}
.srch input::placeholder{color:#CCC;}
.ac-btns{display:flex;gap:5px;padding:0 13px 11px;}
.btn-n{padding:5px 11px;border-radius:20px;font-size:9px;font-weight:500;border:1px solid #E0E0E0;background:#fff;color:#888;cursor:pointer;}
.btn-r{padding:5px 11px;border-radius:20px;font-size:9px;font-weight:500;border:1px solid #ECC890;background:#fff;color:#D07030;cursor:pointer;}
.btn-c{padding:5px 11px;border-radius:20px;font-size:9px;font-weight:500;border:1px solid #A0D8B8;background:#fff;color:#2E8050;cursor:pointer;}
.cfm{background:#FAFAFA;border-top:1px solid #F0F0F0;padding:11px 13px;}
.cfm-t{font-size:10px;font-weight:600;color:#111;margin-bottom:3px;}
.cfm-s{font-size:9px;color:#AAA;margin-bottom:8px;}
.cfm-row{display:flex;gap:6px;}
.cfm-ann{flex:1;background:#fff;border:1px solid #E8E8E8;border-radius:8px;padding:8px;font-size:10px;color:#888;cursor:pointer;}
.cfm-ok{flex:1;background:#111;border:none;border-radius:8px;padding:8px;font-size:10px;color:#fff;font-weight:600;cursor:pointer;}
.fsec{background:#fff;border:1px solid #EBEBEB;border-radius:10px;margin-bottom:10px;overflow:hidden;}
.fhdr{background:#111;color:#fff;padding:9px 14px;font-size:10px;font-weight:600;border-bottom:1px solid #C9921A;}
.ff{padding:10px 14px;border-bottom:1px solid #F5F5F5;}
.ff:last-child{border-bottom:none;}
.fl{font-size:11px;font-weight:600;color:#333;margin-bottom:7px;display:block;}
.req{color:#D94040;margin-left:2px;}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:9px 11px;border:1px solid #E8E8E8;border-radius:7px;font-size:12px;color:#111;background:#FAFAFA;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#C9921A;background:#fff;}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid #E8E8E8;background:#fff;color:#555;cursor:pointer;transition:.1s;}
.chip.on{background:#111;color:#C9921A;border-color:#111;}
.chip.on-g{background:#F0F9F4;color:#2E8050;border-color:#A0D8B8;}
.chip.on-r{background:#FDF0F0;color:#D94040;border-color:#F0B8B8;}
.chip.on-o{background:#FEF5EC;color:#D07030;border-color:#ECC890;}
.btn-primary{display:block;width:100%;background:#111;color:#C9921A;border:1px solid #C9921A;border-radius:8px;padding:13px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;margin-top:10px;}
.btn-ghost{background:#fff;color:#555;border:1px solid #E8E8E8;border-radius:8px;padding:9px 14px;font-size:11px;font-weight:500;cursor:pointer;}
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;border-top:3px solid #C9921A;}
.modal h3{font-size:14px;font-weight:700;color:#111;margin-bottom:14px;}
.loading-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;}
.loading-ov.open{display:flex;}
.loading-box{background:#fff;border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid #F0F0F0;border-top-color:#C9921A;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:#AAA;padding:24px;font-size:12px;}
.succ{background:#F0F9F4;border-radius:8px;padding:12px;font-size:12px;color:#2E8050;font-weight:500;text-align:center;border:1px solid #A0D8B8;margin-top:8px;display:none;}
</style>
</head>
<body>

<div class="loading-ov" id="lov">
  <div class="loading-box">
    <div class="spinner"></div>
    <div style="font-size:12px;color:#888;">Chargement...</div>
  </div>
</div>

<div id="login">
  <div class="login-wrap">
    <div class="login-card">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;">
        <div class="logo-ring" style="width:36px;height:36px;"><div class="logo-m" style="font-size:15px;">M</div></div>
        <span style="font-size:15px;font-weight:700;color:#fff;">MON <span style="color:#C9921A;">CRM</span></span>
      </div>
      <div class="login-title">Bonjour !</div>
      <div class="login-sub" id="login-sub">Bassin de Thau</div>
      <div id="step1"></div>
      <div id="step2" style="display:none;">
        <div class="pin-title" id="pin-lbl">Code PIN</div>
        <div class="pin-row">
          <div class="pin-box" id="pb0"></div><div class="pin-box" id="pb1"></div>
          <div class="pin-box" id="pb2"></div><div class="pin-box" id="pb3"></div>
        </div>
        <div class="pin-pad">
          <button class="pin-key" onclick="pk('1')">1</button>
          <button class="pin-key" onclick="pk('2')">2</button>
          <button class="pin-key" onclick="pk('3')">3</button>
          <button class="pin-key" onclick="pk('4')">4</button>
          <button class="pin-key" onclick="pk('5')">5</button>
          <button class="pin-key" onclick="pk('6')">6</button>
          <button class="pin-key" onclick="pk('7')">7</button>
          <button class="pin-key" onclick="pk('8')">8</button>
          <button class="pin-key" onclick="pk('9')">9</button>
          <button class="pin-key" onclick="pdel()" style="font-size:14px;">&#8592;</button>
          <button class="pin-key" onclick="pk('0')">0</button>
          <button class="pin-key" onclick="pcancel()" style="background:#1A1A1A;font-size:13px;">&#10005;</button>
        </div>
        <div class="pin-err" id="pin-err"></div>
      </div>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <nav class="nav">
    <div class="nav-logo">
      <div class="logo-ring"><div class="logo-m">M</div></div>
      <span style="font-size:12px;font-weight:700;color:#111;margin-left:5px;">MON</span>
      <span style="font-size:12px;font-weight:700;color:#C9921A;margin-left:3px;">CRM</span>
    </div>
    <button class="ntab on" id="nt-accueil" onclick="nav('accueil')">Accueil</button>
    <button class="ntab" id="nt-magasins" onclick="nav('magasins')">Magasins</button>
    <div class="nav-right">
      <div class="bell" onclick="nav('actions')">
        <svg width="18" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div class="bell-dot" id="bell-dot"></div>
      </div>
      <div class="user-av" id="user-av" onclick="deconnexion()">
        <span class="user-ini" id="user-ini">M</span>
      </div>
    </div>
  </nav>
  <div id="pg-accueil" class="pg on"></div>
  <div id="pg-magasins" class="pg"></div>
  <div id="pg-visite" class="pg"></div>
  <div id="pg-actions" class="pg"></div>
  <div id="pg-params" class="pg"></div>
  <div id="pg-fiche" class="pg-fiche"></div>
  <div class="tabbar">
    <div class="tbtn" onclick="nav('accueil')">
      <svg width="22" height="22" id="si-accueil" viewBox="0 0 24 24" fill="none" stroke="#C9921A" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tlbl on" id="sl-accueil">Accueil</span>
    </div>
    <div class="tbtn" onclick="nav('magasins')">
      <svg width="22" height="22" id="si-magasins" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tlbl" id="sl-magasins">Magasins</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="plus-btn" onclick="nav('visite')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span class="plus-lbl">Visite</span>
    </div>
    <div class="tbtn" onclick="nav('actions')" style="position:relative;">
      <svg width="22" height="22" id="si-actions" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="tlbl" id="sl-actions">Actions</span>
      <div class="action-dot" id="action-dot"></div>
    </div>
    <div class="tbtn" onclick="nav('params')">
      <svg width="22" height="22" id="si-params" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>
      <span class="tlbl" id="sl-params">Plus</span>
    </div>
  </div>
</div>

<div class="modal-ov" id="mod-note">
  <div class="modal">
    <h3>Ajouter une note</h3>
    <input type="hidden" id="note-row">
    <div class="ff"><label class="fl">Note de suivi</label>
      <textarea id="note-txt" rows="3" placeholder="Suivi, relance..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn-ghost" style="flex:1" onclick="closeModal('mod-note')">Annuler</button>
      <button class="btn-primary" style="flex:1;margin-top:0;" onclick="saveNote()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="modal-ov" id="mod-action">
  <div class="modal">
    <h3 id="mad-title">Action</h3>
    <div id="mad-body"></div>
    <div id="mad-cfm" style="display:none;" class="cfm">
      <div class="cfm-t" id="mad-cfm-t">Confirmer ?</div>
      <div class="cfm-s" id="mad-cfm-s"></div>
      <div class="cfm-row">
        <button class="cfm-ann" onclick="annulCfm()">Annuler</button>
        <button class="cfm-ok" onclick="doCfm()">Confirmer</button>
      </div>
    </div>
    <div id="mad-main-btns" style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn-ghost" style="flex:1" onclick="closeModal('mod-action')">Fermer</button>
      <button class="btn-r" onclick="askRel()">Relancer</button>
      <button class="btn-c" onclick="askClo()">Cloturer</button>
    </div>
    <div id="mad-msg" class="succ"></div>
  </div>
</div>

<div class="modal-ov" id="mod-perf">
  <div class="modal">
    <h3>Saisir performance</h3>
    <input type="hidden" id="perf-code">
    <div class="ff"><label class="fl">Mois (MM/AAAA)</label><input type="text" id="perf-mois"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="ff"><label class="fl">CA 2026</label><input type="number" id="perf-ca26"></div>
      <div class="ff"><label class="fl">CA N-1</label><input type="number" id="perf-ca25"></div>
      <div class="ff"><label class="fl">Clients 2026</label><input type="number" id="perf-nb26"></div>
      <div class="ff"><label class="fl">Clients N-1</label><input type="number" id="perf-nb25"></div>
      <div class="ff"><label class="fl">CA F&amp;L</label><input type="number" id="perf-fl"></div>
      <div class="ff"><label class="fl">Demarque (EUR)</label><input type="number" id="perf-dmq"></div>
    </div>
    <div class="ff"><label class="fl">Notes</label><textarea id="perf-notes" rows="2"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px;">

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
var SB_URL = 'https://btzwrdjgngfpsutegmci.supabase.co';
var SB_KEY = 'sb_publishable_0vlIW4o7tI847aAQ_8UYsg_FrC3w-Z4';

function sbFetch(path, opts) {
  var options = opts || {};
  options.headers = Object.assign({
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  }, options.headers || {});
  return fetch(SB_URL + '/rest/v1/' + path, options).then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
    var ct = r.headers.get('content-type') || '';
    if (ct.indexOf('json') > -1) return r.json();
    return r.text();
  });
}

// ============================================================
// DONNEES GLOBALES
// ============================================================
var MAGS=[], HISTO=[], ACTS=[], PERFS=[], USERS=[], PARAMS={}, TOUR=[], TODAY='', MOIS='';
var CU=null, PIN_BUF='', PIN_USR=null, C={}, MAD_ROW=null, MAD_ACT=null, CUR_F='tous';

function fmtDate(d) {
  if (!d) return '';
  var dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('fr-FR');
}

function calcScore(jours, freq, nbAct, dernEtat) {
  var s = 0;
  if (jours > freq * 1.5) s += 2; else if (jours > freq) s += 1;
  if (nbAct >= 3) s += 2; else if (nbAct >= 1) s += 1;
  if (dernEtat === 'Mauvais') s += 2; else if (dernEtat === 'Moyen') s += 1;
  return Math.min(s, 4);
}

function buildTour() {
  var now = new Date();
  var tour = MAGS.filter(function(m){ return m.statut==='Actif'||m.statut==='Surveillance'; })
    .map(function(mg) {
      var dv=null, de='';
      for (var i=0;i<HISTO.length;i++) { if(HISTO[i].code===mg.code){dv=HISTO[i].dateRaw;de=HISTO[i].etat;break;} }
      var j = dv ? Math.floor((now-dv)/864e5) : 999;
      var acts = ACTS.filter(function(a){return a.code===mg.code;});
      var sc = calcScore(j, mg.freq_n||14, acts.length, de);
      return { code:mg.code, nom:mg.nom, ville:mg.ville, jours:j, score:sc, nbActs:acts.length, dernEtat:de, statut:mg.statut };
    });
  tour.sort(function(a,b){ return b.score!==a.score?b.score-a.score:b.jours-a.jours; });
  return tour;
}

// ============================================================
// CHARGEMENT INITIAL
// ============================================================
function loadData() {
  showL(true);
  var now = new Date();
  TODAY = now.toISOString().substring(0,10);
  MOIS = ('0'+(now.getMonth()+1)).slice(-2)+'/'+now.getFullYear();

  Promise.all([
    sbFetch('magasins?order=nom'),
    sbFetch('visites?order=date.desc&limit=500'),
    sbFetch('actions?statut=neq.Cloture&order=date.asc'),
    sbFetch('performances?order=mois.desc'),
    sbFetch('utilisateurs?actif=eq.true'),
    sbFetch('parametres')
  ]).then(function(results) {
    MAGS   = results[0] || [];
    HISTO  = (results[1]||[]).map(function(v){ v.dateRaw=new Date(v.date).getTime(); v.dateStr=fmtDate(v.date); return v; });
    ACTS   = (results[2]||[]).map(function(a){
      var age = Math.floor((now-new Date(a.date))/864e5);
      a.age = age; a.mag = a.mag||''; a.desc = a.description||''; return a;
    });
    PERFS  = results[3] || [];
    USERS  = results[4] || [];
    PARAMS = {};
    (results[5]||[]).forEach(function(p){ PARAMS[p.cle]=p.valeur; });
    TOUR   = buildTour();
    showL(false);
    try {
      var s = localStorage.getItem('crm15');
      if (s) { var u=JSON.parse(s); if(USERS.some(function(x){return x.nom===u.nom;})){CU=u;startApp();return;} }
    } catch(e) {}
    buildLogin();
  }).catch(function(err) {
    showL(false);
    document.getElementById('login').innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;padding:20px;">' +
      '<div style="background:#1A1A1A;border-radius:16px;padding:24px;border:1px solid #D94040;max-width:340px;width:100%;text-align:center;">' +
      '<div style="font-size:28px;margin-bottom:12px;">&#9888;</div>' +
      '<div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px;">Erreur de connexion</div>' +
      '<div style="font-size:11px;color:#D94040;">' + err.message + '</div></div></div>';
  });
}

// ============================================================
// LOGIN
// ============================================================
function buildLogin() {
  var sub = document.getElementById('login-sub');
  if (sub && PARAMS.SECTEUR) sub.textContent = PARAMS.SECTEUR;

      '<div class="user-btn-av" style="background:'+u.couleur+';">'+ini+'</div>' +

}

function selectUser(nom,ini,couleur,role,secteur) {
  PIN_USR={nom:nom,ini:ini,couleur:couleur,role:role,secteur:secteur}; PIN_BUF='';
  document.getElementById('pin-lbl').textContent=nom+' - code PIN';

}

function pk(c) {
  if(PIN_BUF.length>=4)return; PIN_BUF+=c;
  var p=g('pb'+(PIN_BUF.length-1)); p.textContent='*'; p.classList.add('f');
  if(PIN_BUF.length===4) setTimeout(verifyPin,200);
}
function pdel() {
  if(!PIN_BUF.length)return; PIN_BUF=PIN_BUF.slice(0,-1);

    CU=PIN_USR;
    try{localStorage.setItem('crm15',JSON.stringify(CU));}catch(e){}

  } else {
    for(var i=0;i<4;i++)g('pb'+i).className='pin-box err';

  }
}
function startApp() {

function deconnexion() {

// ============================================================
// NAVIGATION
// ============================================================
var PAGES=['accueil','magasins','visite','actions','params','fiche'];
function nav(name) {
  PAGES.forEach(function(id){var el=g('pg-'+id);if(el){el.style.display='none';el.classList.remove('on');}});
  var pg=g('pg-'+name); if(pg){pg.style.display='block';pg.classList.add('on');}

function buildAccueil() {

  var nbAl=ACTS.filter(function(a){return a.alerte;}).length;

    var last=idx===Math.min(TOUR.length,5)-1;

    h+='<div class="tour-body"><div class="tour-nm">'+mr.nom+'</div><div class="tour-sub">'+mr.jours+'j sans visite</div></div>';
    h+='<span class="pill '+pc+'">'+sc+'</span><span class="chev">&#8250;</span></div>';
  });
  if(!TOUR.length)h+='<div class="empty">Aucun magasin actif</div>';

    h+='<div class="card" style="padding:14px;margin-bottom:14px;"><div class="sec-hdr"><span class="sec-title">Alertes prioritaires</span><button class="sec-link" onclick="nav(\'actions\')">Voir tout</button></div>';

function mkKpi(ico,val,lbl,color){return '<div class="kpi"><div class="kpi-ico">'+ico+'</div><div class="kv" style="color:'+color+';">'+val+'</div><div class="kl">'+lbl+'</div></div>';}

function buildMagasins() {
  var h='<div class="frow">';
  h+='<span class="fp on" id="fp-tous" onclick="setF(\'tous\',this)">Tous</span>';
  h+='<span class="fp off" id="fp-risque" onclick="setF(\'risque\',this)">A risque</span>';

  h+='<div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
  h+='<input id="mag-search" placeholder="Nom, code TF, ville..." oninput="filterMags()"></div>';
  h+='<div id="mag-count" style="font-size:11px;color:#AAA;margin-bottom:8px;"></div>';
  h+='<div id="mag-list"></div>';
  g('pg-magasins').innerHTML=h;
}
function setF(f,el){CUR_F=f;document.querySelectorAll('.fp').forEach(function(p){p.className='fp off';});if(el)el.className='fp on';filterMags();}
function filterMags() {
  var v=(g('mag-search')||{value:''}).value.toLowerCase();
  var list=MAGS.filter(function(m){
    var t=!v||(m.nom.toLowerCase().indexOf(v)>-1||m.code.toLowerCase().indexOf(v)>-1||(m.ville||'').toLowerCase().indexOf(v)>-1);
    var tr=TOUR.find(function(t2){return t2.code===m.code;});
    var sc=tr?tr.score:0;
    var f=CUR_F==='tous'?true:CUR_F==='risque'?sc>=1:sc===0;
    return t&&f;
  });
  var cnt=g('mag-count'); if(cnt)cnt.textContent=list.length+' magasin(s)';
  var ml=g('mag-list'); if(!ml)return;
  var h='';
  list.forEach(function(mg){
    var tr=TOUR.find(function(t){return t.code===mg.code;});
    var sc=tr?tr.score:0,j=tr?tr.jours:999;
    var cls=sc>=2?'r':sc>=1?'o':'g';
    var pc=sc>=2?'pill-r':sc>=1?'pill-o':'pill-g';
    var lbl=sc>=2?'URGENT':sc>=1?'A RISQUE':'CONFORME';
    var scn=Math.max(0,100-sc*20-(j>14?10:0));
    var msc=sc>=2?'ms-r':sc>=1?'ms-o':'ms-g';
    h+='<div class="mag-card '+cls+'" onclick="ouvrirFiche(\''+mg.code+'\')"><div class="mag-info"><div class="mag-nm">'+mg.nom+'</div>';
    h+='<div class="mag-meta"><span class="tf">'+mg.code+'</span><span style="font-size:10px;color:#AAA;">'+mg.ville+'</span></div>';
    h+='<div style="margin-top:5px;"><span class="pill '+pc+'">'+lbl+'</span></div></div>';
    h+='<div class="mag-score '+msc+'"><span style="font-size:13px;font-weight:700;">'+scn+'</span><span style="font-size:8px;color:#AAA;">/100</span></div>';
    h+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>';
  });
  if(!h)h='<div class="empty">Aucun magasin</div>';
  ml.innerHTML=h;
}

function mkChips(lbl,group,opts,req){var h='<div class="fsec"><div class="fhdr">'+lbl+(req?'*':'')+'</div><div class="ff"><div class="chips" id="chips-'+group+'">';opts.forEach(function(o){h+='<span class="chip" onclick="csel(this,\''+group+'\')">'+o+'</span>';});return h+'</div></div></div>';}
function csel(el,gr){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C[gr]=el.textContent.trim();}
function setRB(el,v){g('chips-rb').querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add('on');C.rb=v;}
function togAct(el,show){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add(show?'on-r':'on');C.action=show?'Oui':'Non';g('act-det').style.display=show?'block':'none';}
function togAl(el,show){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.className='chip';});el.classList.add(show?'on-r':'on');C.alerte=show?'Oui':'Non';g('al-det').style.display=show?'block':'none';}

function soumettreVisite() {
  var ms=g('f-mag'); if(!ms||!ms.value){alert('Choisissez un magasin');return;}
  if(!C.etat){alert('Indiquez l\'etat general');return;}
  showL(true);
  var now=new Date();
  var visiteData={date:now.toISOString(),code:ms.value,nom:gv('f-mag-nom'),motif:'terrain',etat:C.etat||'',lineaire:C.lineaire||'',procedures:C.procedures||'',ruptures:C.ruptures||'',dlc:C.dlc||'',gerant:gv('f-gerant'),autonomie:C.autonomie||'',cr:gv('f-cr'),moniteur:CU?CU.nom:'',type_visite:'terrain',alerte:C.alerte==='Oui'?gv('f-alerte'):''};
  var p=Promise.resolve();
  var actId='';
  if(C.action==='Oui'&&gv('f-act')){
    actId='ACT'+now.getTime();
    var actionData={action_id:actId,date:now.toISOString(),code:ms.value,mag:gv('f-mag-nom'),description:gv('f-act'),statut:'Ouvert',resp_badge:C.rb||'',alerte:C.alerte==='Oui'?gv('f-alerte'):''};
    p=sbFetch('actions',{method:'POST',body:JSON.stringify(actionData)}).then(function(rows){
      var newAct=Array.isArray(rows)?rows[0]:rows;
      newAct.age=0; newAct.desc=newAct.description||''; newAct.mag=newAct.mag||'';
      ACTS.push(newAct);
    });
  }
  visiteData.action_id=actId;
  p.then(function(){
    return sbFetch('visites',{method:'POST',body:JSON.stringify(visiteData)});
  }).then(function(rows){
    var newV=Array.isArray(rows)?rows[0]:rows;
    newV.dateRaw=new Date(newV.date).getTime(); newV.dateStr=fmtDate(newV.date);
    HISTO.unshift(newV); TOUR=buildTour();
    showL(false);
    var msg=g('v-msg'); msg.style.display='block';
    C={}; C.action='Oui';
    setTimeout(function(){msg.style.display='none';buildAccueil();nav('accueil');},2000);
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

function doCfm() {
  if(!MAD_ROW||!MAD_ACT)return;
  var note=gv('mad-note');
  showL(true);
  var p;
  if(MAD_ACT==='cloturer'){
    p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Cloture'})});
  } else {
    var ac=ACTS.find(function(a){return a.id==MAD_ROW;});
    var suivi=(ac&&ac.notes_suivi?ac.notes_suivi+'\n':'')+note+' ('+new Date().toLocaleDateString('fr-FR')+')';
    p=sbFetch('actions?id=eq.'+MAD_ROW,{method:'PATCH',body:JSON.stringify({statut:'Relance',nb_relances:(ac?((ac.nb_relances||0)+1):1),notes_suivi:suivi})});
  }
  p.then(function(){
    showL(false); closeModal('mod-action');

    else ACTS=ACTS.map(function(a){if(a.id==MAD_ROW){a.statut='Relance';a.nb_relances=(a.nb_relances||0)+1;}return a;});
    buildAccueil(); renderActions(); MAD_ROW=null; MAD_ACT=null;
  }).catch(function(err){showL(false);alert('Erreur: '+err.message);});
}

  g('pg-params').innerHTML=h;

// ============================================================
// RAPPORT
// ============================================================
function genRapport() {
  var now=new Date();
  var sem=Math.ceil((now-new Date(now.getFullYear(),0,1))/(7*864e5));
  var debut=new Date(); debut.setDate(1); debut.setHours(0,0,0,0);
  var vm=HISTO.filter(function(h){return h.dateRaw>=debut.getTime();});
  var lines=['RAPPORT SEMAINE '+sem,'Moniteur : '+(CU?CU.nom:''),'Secteur  : '+(PARAMS.SECTEUR||'Bassin de Thau'),'='.repeat(30),'','INDICATEURS','Visites ce mois : '+vm.length,'Actions ouvertes : '+ACTS.length,''];
  lines.push('VISITES DU MOIS');
  if(!vm.length)lines.push('Aucune visite ce mois.');
  vm.forEach(function(v){lines.push((v.etat==='Bon'||v.etat==='Tres bon'?'OK ':'!  ')+v.nom+' '+v.dateStr+' '+(v.motif||''));});
  lines.push('','ACTIONS EN COURS');
  if(!ACTS.length)lines.push('Aucune action.');
  ACTS.slice(0,10).forEach(function(a){lines.push((a.age>20?'URGENT':a.age>8?'SUIVI':'OK')+' '+a.mag+' J+'+a.age+' '+a.desc);});
  var fragiles=TOUR.filter(function(t){return t.score>=2;});
  if(fragiles.length){lines.push('','A SURVEILLER');fragiles.forEach(function(t){lines.push(t.nom+' '+t.code+' - '+t.jours+'j sans visite');});}
  lines.push('','Genere le '+now.toLocaleDateString('fr-FR'));
  var txt=lines.join('\n');
  var wrap=document.createElement('div'); wrap.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:500;padding:16px;overflow-y:auto;';
  var btnF=document.createElement('button'); btnF.textContent='Fermer'; btnF.className='btn-ghost'; btnF.style.marginBottom='10px'; btnF.onclick=function(){document.body.removeChild(wrap);};
  var ta=document.createElement('textarea'); ta.value=txt; ta.style.cssText='width:100%;height:65vh;font-size:12px;line-height:1.7;border:1px solid #E8E8E8;border-radius:8px;padding:12px;font-family:monospace;';
  var btnC=document.createElement('button'); btnC.textContent='Copier'; btnC.className='btn-primary'; btnC.style.marginTop='10px'; btnC.onclick=function(){ta.select();document.execCommand('copy');btnC.textContent='Copie !';};
  wrap.appendChild(btnF); wrap.appendChild(ta); wrap.appendChild(btnC); document.body.appendChild(wrap);
}
